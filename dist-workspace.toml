[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Path that installers should place binaries in
install-path = "~/.acton/bin/"
# Where to host releases
hosting = "github"
# Build only the distable package instead of the full workspace
precise-builds = true
# This repository already creates the GitHub Release before assets are uploaded
create-release = false
# Keep public releases focused on binaries/installers
source-tarball = false
# Dist can reuse these if we later switch to generated CI
github-build-setup = "../cargo-dist-build-setup.yml"
github-custom-runners = { aarch64-apple-darwin = "macos-15", aarch64-unknown-linux-gnu = "ubicloud-standard-4-arm-ubuntu-2204", x86_64-apple-darwin = "macos-15-intel", x86_64-unknown-linux-gnu = "ubicloud-standard-4-ubuntu-2204" }
# Whether to install an updater program
install-updater = false
