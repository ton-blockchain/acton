[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# Whether to consider the binaries in a package for distribution (defaults true)
dist = false
# CI backends to support
ci = "github"
# Skip checking whether the specified configuration files are up to date
allow-dirty = ["ci"]
# The installers to generate for each app
installers = ["shell"]
# The archive format to use for non-windows builds (defaults .tar.xz)
unix-archive = ".tar.gz"
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Whether to auto-include files like READMEs, LICENSEs, and CHANGELOGs (default true)
auto-includes = false
# Whether CI should include auto-generated code to build local artifacts
build-local-artifacts = false
# Local artifacts jobs to run in CI
local-artifacts-jobs = ["./build-release-binaries", "./attach-objs-to-releases"]
# Global artifacts jobs to run in CI
global-artifacts-jobs = ["./build-docker-image"]
# Which phase dist should use to create the GitHub release
github-release = "announce"
# Whether to enable GitHub Attestations
github-attestations = false
# Which actions to run on pull requests
pr-run-mode = "skip"
# Plan jobs to run in CI
plan-jobs = ["./verify-version"]
# Post-announce jobs to run in CI
post-announce-jobs = ["./publish-docker-image", "./publish-mirror"]
# Host jobs to run in CI
host-jobs = ["./check-release-binary", "./check-installer-file"]
# Path that installers should place binaries in
install-path = "~/.acton/bin"
# Whether to install an updater program
install-updater = false
# Where to host releases
hosting = ["simple", "github"]
# A URL to download artifacts from
simple-download-url = "https://github.com/i582/acton-public/releases/download/{tag}"

[dist.github-custom-runners]
global = "ubicloud-standard-2-ubuntu-2204"

[dist.github-action-commits]
"actions/checkout" = "de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
"actions/upload-artifact" = "bbbca2ddaa5d8feaa63e36b76fdaad77386f024f" # v7.0.0
"actions/download-artifact" = "3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
