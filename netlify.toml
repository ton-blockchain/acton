[build]
base = "docs"
command = """
export NEXT_PUBLIC_SITE_URL="$DEPLOY_PRIME_URL"
bun ci &&
bun run generated-source &&
bun run docs-lint &&
bun run build
"""
publish = "out"
ignore = "bash ./scripts/netlify-ignore-build.sh"

[build.environment]
BUN_VERSION = "1.3.5"
NEXT_TELEMETRY_DISABLED = "1"
