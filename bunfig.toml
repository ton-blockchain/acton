[install]
frozenLockfile = true
ignoreScripts = false
minimumReleaseAge = 604800 # 7 days in seconds

# The version cannot be specified. It will be possible after: https://github.com/oven-sh/bun/issues/28967
minimumReleaseAgeExcludes = ["@ton/retracer-core", "@ton/tolk-abi-to-typescript", "undici"]
