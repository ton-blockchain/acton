</tspan>
    <tspan x="10px" y="64px"><tspan class="fg-yellow">true</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan class="bold">null</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan>plain string</tspan>
</tspan>
