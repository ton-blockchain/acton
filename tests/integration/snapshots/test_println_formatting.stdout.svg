</tspan>
    <tspan x="10px" y="136px"><tspan>    a: </tspan><tspan class="fg-yellow">1</tspan><tspan>,</tspan>
</tspan>
    <tspan x="10px" y="154px"><tspan>    b: </tspan><tspan class="fg-yellow">true</tspan>
</tspan>
    <tspan x="10px" y="172px"><tspan class="dimmed">}</tspan>
</tspan>
    <tspan x="10px" y="190px"><tspan class="fg-magenta">Nested</tspan><tspan> </tspan><tspan class="dimmed">{</tspan>
</tspan>
    <tspan x="10px" y="208px"><tspan>    s: </tspan><tspan class="fg-magenta">Simple</tspan><tspan> </tspan><tspan class="dimmed">{</tspan>
</tspan>
    <tspan x="10px" y="226px"><tspan>        a: </tspan><tspan class="fg-yellow">42</tspan><tspan>,</tspan>
</tspan>
