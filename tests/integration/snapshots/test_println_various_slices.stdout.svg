<svg width="740px" height="110px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #AAAAAA }
    .bg { fill: #000000 }
    .fg-green { fill: #00AA00 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .bold { font-weight: bold; }
    .dimmed { opacity: 0.7; }
    tspan {
      font: 14px SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan>  </tspan><tspan class="fg-green bold">Installing</tspan><tspan> standard library [ACTON_VERSION]</tspan>
</tspan>
    <tspan x="10px" y="46px"><tspan>hello world</tspan>
</tspan>
    <tspan x="10px" y="64px"><tspan>[BOC_HEX]</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan>(</tspan><tspan class="dimmed">[BOC_HEX]</tspan><tspan>, empty slice)</tspan>
</tspan>
    <tspan x="10px" y="100px">
</tspan>
  </text>

</svg>
