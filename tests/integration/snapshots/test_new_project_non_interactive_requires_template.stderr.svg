<svg width="740px" height="146px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #AAAAAA }
    .bg { fill: #000000 }
    .fg-cyan { fill: #00AAAA }
    .fg-red { fill: #AA0000 }
    .fg-yellow { fill: #AA5500 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .bold { font-weight: bold; }
    tspan {
      font: 14px SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan class="fg-red">Error:</tspan><tspan> Project template is required when running acton new non-interactively.</tspan>
</tspan>
    <tspan x="10px" y="46px">
</tspan>
    <tspan x="10px" y="64px"><tspan>Pass </tspan><tspan class="fg-yellow bold">--template &lt;TEMPLATE&gt;</tspan><tspan>, for example:</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan>  </tspan><tspan class="fg-cyan">acton new [ROOT]/foobar --template empty</tspan>
</tspan>
    <tspan x="10px" y="100px">
</tspan>
    <tspan x="10px" y="118px"><tspan>Available templates: </tspan><tspan class="fg-cyan">empty, counter, jetton, nft</tspan>
</tspan>
    <tspan x="10px" y="136px">
</tspan>
  </text>

</svg>
