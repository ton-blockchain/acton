[package]
name = "add-counter-template"
description = "Add template integration test"
version = "0.1.0"
license = "MIT"

[toolchain]
acton = "[ACTON_VERSION]"

[contracts.Counter]
display-name = "Counter"
src = "contracts/counter/Counter.tolk"
depends = []

[contracts.Empty]
display-name = "Empty"
src = "contracts/Empty.tolk"
depends = []

[test]

[fmt]
width = 100
ignore = []

[scripts]
deploy-emulation = "acton script scripts/deploy.tolk"
deploy-testnet = "acton script scripts/deploy.tolk --net testnet"

[import-mappings]
acton = ".acton"
contracts = "contracts"
gen = "gen"
tests = "tests"
wrappers = "wrappers"
