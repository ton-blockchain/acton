[package]
name = "Acton"
description = "All-in-one toolkit for TON Blockchain smartcontract development"
version = "1.1.0"
license = "MIT"

[test]
include = ["tests/acton-stdlib/**"]
fail-on-diff = false

[test.mutation]

[lint]
exclude = ["tests/**", "**/templates/**", "crates/acton-test-ui/e2e/**"]

[fmt]
ignore = ["crates/tolk-compiler/**"]

[localnet]
port = 3010
accounts = []

[networks.localnet]
api = { v2 = "http://localhost:3010/api/v2", v3 = "http://localhost:3010/api/v3" }

[import-mappings]
acton = ".acton"
local-acton = "lib"
