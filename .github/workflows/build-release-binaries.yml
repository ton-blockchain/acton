name: "Build release binaries"

on:
  workflow_call:
    inputs:
      plan:
        required: false
        type: string

concurrency:
  group: build-release-binaries-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubicloud-standard-8-ubuntu-2204
            os: linux
            arch: x86_64
          - runner: ubicloud-standard-8-arm-ubuntu-2204
            os: linux
            arch: aarch64
    env:
      OBJS_NAME: ton-objs-${{ matrix.arch }}-unknown-${{ matrix.os }}-gnu
      TARGET_NAME: ${{ matrix.arch }}-unknown-${{ matrix.os }}-gnu

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Cache Cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ runner.os }}-${{ runner.arch }}
          save-if: false
          lookup-only: true

      - name: Install Rust
        run: rustup target add "${TARGET_NAME}"

      - name: Installing additional Rust components
        uses: taiki-e/install-action@d6e286fa45544157a02d45a43742857ebbc25d12 # v2.68.16
        with:
          tool: just

      - name: Install LLVM and Clang (don't cache)
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Download TON objects archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE_NAME="${OBJS_NAME}.tar.gz"
          mkdir -p objs
          gh release download trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${ARCHIVE_NAME}" \
            --dir "${RUNNER_TEMP}"
          tar -C objs -xzf "${RUNNER_TEMP}/${ARCHIVE_NAME}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          no-cache: true

      - name: Build acton binary
        env:
          CC: clang-16
          CXX: clang++-16
        run: |
          just build-ui
          cargo build --profile release-size --locked --target "${TARGET_NAME}" --bin acton

      - name: Test acton binary
        run: |
          "./target/${TARGET_NAME}/release-size/acton" --help

      - name: Prepare Acton archive
        shell: bash
        # language=Bash
        run: |
          set -euo pipefail

          ARTIFACTS_DIR="acton-${TARGET_NAME}"
          ARCHIVE_NAME="${ARTIFACTS_DIR}.tar.gz"

          mkdir -p "${ARTIFACTS_DIR}"
          cp "target/${TARGET_NAME}/release-size/acton" "${ARTIFACTS_DIR}/acton"
          tar -czvf "${ARCHIVE_NAME}" -C "${ARTIFACTS_DIR}" .
          shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

      - name: Upload Acton archive as artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ env.TARGET_NAME }}
          path: |
            acton-${{ env.TARGET_NAME }}.tar.gz
            acton-${{ env.TARGET_NAME }}.tar.gz.sha256
          retention-days: 1
          if-no-files-found: error

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            os: apple-darwin
            arch: x86_64
          - runner: macos-15
            os: apple-darwin
            arch: aarch64
    env:
      OBJS_NAME: ton-objs-${{ matrix.arch }}-${{ matrix.os }}
      TARGET_NAME: ${{ matrix.arch }}-${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Cache Cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ runner.os }}-${{ runner.arch }}
          save-if: false
          lookup-only: true

      - name: Install Rust
        run: rustup target add "${TARGET_NAME}"

      - name: Installing additional Rust components
        uses: taiki-e/install-action@d6e286fa45544157a02d45a43742857ebbc25d12 # v2.68.16
        with:
          tool: just

      - name: Download TON objects archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE_NAME="${OBJS_NAME}.tar.gz"
          mkdir -p objs
          gh release download trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${ARCHIVE_NAME}" \
            --dir "${RUNNER_TEMP}"
          tar -C objs -xzf "${RUNNER_TEMP}/${ARCHIVE_NAME}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          no-cache: true

      - name: Build acton binary
        run: |
          just build-ui
          cargo build --profile release-size --locked --target "${TARGET_NAME}" --bin acton

      - name: Test acton binary
        run: |
          "./target/${TARGET_NAME}/release-size/acton" --help

      - name: Prepare Acton archive
        shell: bash
        # language=Bash
        run: |
          set -euo pipefail

          ARTIFACTS_DIR="acton-${TARGET_NAME}"
          ARCHIVE_NAME="${ARTIFACTS_DIR}.tar.gz"

          mkdir -p "${ARTIFACTS_DIR}"
          cp "target/${TARGET_NAME}/release-size/acton" "${ARTIFACTS_DIR}/acton"
          tar -czvf "${ARCHIVE_NAME}" -C "${ARTIFACTS_DIR}" .
          shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

      - name: Upload Acton archive as artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ env.TARGET_NAME }}
          path: |
            acton-${{ env.TARGET_NAME }}.tar.gz
            acton-${{ env.TARGET_NAME }}.tar.gz.sha256
          retention-days: 1
          if-no-files-found: error
