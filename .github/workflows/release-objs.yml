name: Release TON Objs

on:
  workflow_dispatch:

concurrency:
  group: release-objs-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

env:
  TON_REPOSITORY: i582/ton
  TON_BRANCH: pmakhnev/acton

  ENABLE_MIRRORING_RELEASE: 'true'
  PUBLIC_ACTON_REPOSITORY: i582/acton-public

jobs:
  prepare:
    name: Resolve TON Commit
    runs-on: ubicloud-standard-2-ubuntu-2204

    permissions:
      contents: read

    outputs:
      ton_commit: ${{ steps.ton-commit.outputs.commit }}

    steps:
      - name: Get TON commit hash
        id: ton-commit
        run: |
          TON_COMMIT=$(gh api -H "Accept: application/vnd.github.sha" "repos/${TON_REPOSITORY}/commits/${TON_BRANCH}")
          echo "commit=$TON_COMMIT" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Show TON commit hash
        run: |
          echo "Resolved ${TON_REPOSITORY}@${TON_BRANCH} to ${TON_COMMIT}"
          {
            echo "## TON source"
            echo
            echo "- Repository: \`${TON_REPOSITORY}\`"
            echo "- Branch: \`${TON_BRANCH}\`"
            echo "- Commit: \`${TON_COMMIT}\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          TON_COMMIT: ${{ steps.ton-commit.outputs.commit }}

  build-objs-linux:
    name: Prepare TON objects (${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}-${{ matrix.abi }})
    needs: [ prepare ]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubicloud-standard-8-ubuntu-2204
            arch: x86_64
            vendor: unknown
            sys: linux
            abi: gnu
          - runner: ubicloud-standard-8-arm-ubuntu-2204
            arch: aarch64
            vendor: unknown
            sys: linux
            abi: gnu
    env:
      TARGET_NAME: ${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}-${{ matrix.abi }}

    permissions:
      contents: read

    steps:
      - name: Restore TON objects archive cache
        id: archive-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz.sha256
          key: ton-objs-${{ env.TARGET_NAME }}-${{ needs.prepare.outputs.ton_commit }}

      - name: Install LLVM and Clang
        if: steps.archive-cache.outputs.cache-hit != 'true'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Install system dependencies
        if: steps.archive-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config autoconf automake libssl-dev libtool zlib1g-dev libsecp256k1-dev libmicrohttpd-dev libsodium-dev liblz4-dev libjemalloc-dev ccache clang-16 llvm-16 libc++-16-dev libc++abi-16-dev
          echo "/usr/lib/llvm-16/bin" >> "$GITHUB_PATH"

      - name: Clone TON repository
        if: steps.archive-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ env.TON_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.ton_commit }}
          fetch-depth: 1
          submodules: true

      - name: Build TON static libraries
        if: steps.archive-cache.outputs.cache-hit != 'true'
        env:
          CC: clang-16
          CXX: clang++-16
          AR: llvm-ar-16
          RANLIB: llvm-ranlib-16
        run: |
          cp assembly/native/build-ubuntu-static.sh .
          chmod +x build-ubuntu-static.sh
          ./build-ubuntu-static.sh -a -c

      - name: Show ccache stats
        if: steps.archive-cache.outputs.cache-hit != 'true'
        run: ccache -s

      - name: Generate TON artifacts lock file
        if: steps.archive-cache.outputs.cache-hit != 'true'
        env:
          TON_COMMIT: ${{ needs.prepare.outputs.ton_commit }}
        # language=Bash
        run: |
          libemulator_sha256=$(sha256sum artifacts/libemulator.a | awk '{ print $1 }')
          libtolk_sha256=$(sha256sum artifacts/libtolk.a | awk '{ print $1 }')

          jq -n \
            --arg ton_commit "${TON_COMMIT}" \
            --arg rust_target "${TARGET_NAME}" \
            --arg libemulator_sha256 "${libemulator_sha256}" \
            --arg libtolk_sha256 "${libtolk_sha256}" \
            '{
              ton_commit: $ton_commit,
              rust_target: $rust_target,
              sha256_libemulator: $libemulator_sha256,
              sha256_libtolk: $libtolk_sha256
            }' > artifacts/ton-artifacts.lock

      - name: Validate TON objects
        if: steps.archive-cache.outputs.cache-hit != 'true'
        run: |
          ls -lh artifacts
          test -f artifacts/libemulator.a
          test -f artifacts/libtolk.a
          test -f artifacts/ton-artifacts.lock
          cat artifacts/ton-artifacts.lock

      - name: Pack TON objects
        if: steps.archive-cache.outputs.cache-hit != 'true'
        # language=Bash
        run: |
          ARCHIVE_NAME="ton-objs-${TARGET_NAME}.tar.gz"

          mkdir -p dist
          tar -C artifacts -czf "dist/${ARCHIVE_NAME}" \
            libemulator.a \
            libtolk.a \
            ton-artifacts.lock
          shasum -a 256 "dist/${ARCHIVE_NAME}" > "dist/${ARCHIVE_NAME}.sha256"

      - name: Save TON objects archive cache
        if: github.ref == 'refs/heads/master' && steps.archive-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz.sha256
          key: ton-objs-${{ env.TARGET_NAME }}-${{ needs.prepare.outputs.ton_commit }}

      - name: Upload TON objects artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ton-objs-${{ env.TARGET_NAME }}
          path: |
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz.sha256
          retention-days: 1
          if-no-files-found: error

  build-objs-macos:
    name: Prepare TON objects (${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }})
    needs: [ prepare ]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
            vendor: apple
            sys: darwin
          - runner: macos-15
            arch: aarch64
            vendor: apple
            sys: darwin
    env:
      TARGET_NAME: ${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}

    permissions:
      contents: read

    steps:
      - name: Restore TON objects archive cache
        id: archive-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz.sha256
          key: ton-objs-${{ env.TARGET_NAME }}-${{ needs.prepare.outputs.ton_commit }}

      - name: Clone TON repository
        if: steps.archive-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ env.TON_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.ton_commit }}
          fetch-depth: 1
          submodules: true

      - name: Build TON static libraries
        if: steps.archive-cache.outputs.cache-hit != 'true'
        run: |
          cp assembly/native/build-macos-static.sh .
          chmod +x build-macos-static.sh
          ./build-macos-static.sh -a

      - name: Generate TON artifacts lock file
        if: steps.archive-cache.outputs.cache-hit != 'true'
        env:
          TON_COMMIT: ${{ needs.prepare.outputs.ton_commit }}
        # language=Bash
        run: |
          libemulator_sha256=$(shasum -a 256 artifacts/libemulator.a | awk '{ print $1 }')
          libtolk_sha256=$(shasum -a 256 artifacts/libtolk.a | awk '{ print $1 }')

          jq -n \
            --arg ton_commit "${TON_COMMIT}" \
            --arg rust_target "${TARGET_NAME}" \
            --arg libemulator_sha256 "${libemulator_sha256}" \
            --arg libtolk_sha256 "${libtolk_sha256}" \
            '{
              ton_commit: $ton_commit,
              rust_target: $rust_target,
              sha256_libemulator: $libemulator_sha256,
              sha256_libtolk: $libtolk_sha256
            }' > artifacts/ton-artifacts.lock

      - name: Validate TON objects
        if: steps.archive-cache.outputs.cache-hit != 'true'
        run: |
          ls -lh artifacts
          test -f artifacts/libemulator.a
          test -f artifacts/libtolk.a
          test -f artifacts/ton-artifacts.lock
          cat artifacts/ton-artifacts.lock

      - name: Pack TON objects
        if: steps.archive-cache.outputs.cache-hit != 'true'
        # language=Bash
        run: |
          ARCHIVE_NAME="ton-objs-${TARGET_NAME}.tar.gz"

          mkdir -p dist
          tar -C artifacts -czf "dist/${ARCHIVE_NAME}" \
            libemulator.a \
            libtolk.a \
            ton-artifacts.lock
          shasum -a 256 "dist/${ARCHIVE_NAME}" > "dist/${ARCHIVE_NAME}.sha256"

      - name: Save TON objects archive cache
        if: github.ref == 'refs/heads/master' && steps.archive-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz.sha256
          key: ton-objs-${{ env.TARGET_NAME }}-${{ needs.prepare.outputs.ton_commit }}

      - name: Upload TON objects artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ton-objs-${{ env.TARGET_NAME }}
          path: |
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz.sha256
          retention-days: 1
          if-no-files-found: error

  check-objs:
    name: Check TON objects (${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}-${{ matrix.abi }})
    needs: [ build-objs-linux ]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubicloud-standard-4-ubuntu-2204
            arch: x86_64
            vendor: unknown
            sys: linux
            abi: gnu
    env:
      TARGET_NAME: ${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}-${{ matrix.abi }}

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install LLVM and Clang
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libssl-dev \
            qemu-user

      - name: Download TON objects artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ton-objs-${{ env.TARGET_NAME }}
          path: ${{ runner.temp }}/ton-objs

      - name: Unpack TON objects archive
        shell: bash
        # language=Bash
        run: |
          set -euo pipefail

          mkdir -p objs
          tar -C objs -xzf "${RUNNER_TEMP}/ton-objs/ton-objs-${TARGET_NAME}.tar.gz"

          ls -lh objs

      - name: Create acton-mock source file
        shell: bash
        # language=Bash
        run: |
          set -euo pipefail

          cat > acton-mock.c <<'EOF'
          #include <stdio.h>

          const char *emulator_version(void);
          const char *tolk_version(void);

          int main(void) {
            const char *emulator = emulator_version();
            const char *tolk = tolk_version();

            printf("emulator_version=%s\n", emulator != NULL ? emulator : "<null>");
            printf("tolk_version=%s\n", tolk != NULL ? tolk : "<null>");
            return 0;
          }
          EOF

      - name: Build acton-mock object file
        shell: bash
        # language=Bash
        run: |
          set -euo pipefail

          clang-16 \
            -O2 \
            -Wall \
            -Wextra \
            -pedantic \
            -c acton-mock.c \
            -o acton-mock.o

      - name: Link acton-mock binary
        shell: bash
        # language=Bash
        run: |
          set -euo pipefail

          clang-16 \
            acton-mock.o \
            objs/libemulator.a \
            objs/libtolk.a \
            -lstdc++ \
            -lm \
            -lcrypto \
            -o acton-mock

      - name: Check acton-mock works without AVX in QEMU
        shell: bash
        run: |
          qemu-x86_64 -cpu qemu64,avx=off,avx2=off ./acton-mock


  generate-release-objs-manifest:
    name: Generate Release Objs Manifest
    needs: [ build-objs-linux, build-objs-macos ]
    runs-on: ubicloud-standard-2-ubuntu-2204

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Download TON objects artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ton-objs-*
          path: dist
          merge-multiple: true

      - name: Extract TON artifacts manifests from archives
        # language=Bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          for archive in dist/ton-objs-*.tar.gz; do
            json_name="$(basename "${archive%.tar.gz}.json")"
            json_path="release-assets/${json_name}"
            tar -xOf "${archive}" ton-artifacts.lock > "${json_path}"
            test -s "${json_path}"
          done

      - name: Generate TON artifacts manifest
        # language=Bash
        run: |
          python3 .github/scripts/generate-artifacts-manifest.py \
            --input-path release-assets \
            --output-path dist/artifacts_manifest.toml

          test -s dist/artifacts_manifest.toml
          cat dist/artifacts_manifest.toml

      - name: Upload TON artifacts manifest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ton-objs-manifest
          path: dist/artifacts_manifest.toml
          retention-days: 1
          if-no-files-found: error

  package-stdlib-sources:
    name: Package TON stdlib sources
    needs: [ prepare ]
    runs-on: ubicloud-standard-2-ubuntu-2204

    permissions:
      contents: read

    steps:
      - name: Clone TON repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ env.TON_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.ton_commit }}
          fetch-depth: 1

      - name: Collect TON stdlib sources
        shell: bash
        # language=Bash
        run: |
          set -euo pipefail

          mkdir -p artifacts
          cp -R crypto/smartcont/tolk-stdlib artifacts/
          cp -R crypto/fift/lib artifacts/fift-stdlib

      - name: Validate TON stdlib sources
        shell: bash
        # language=Bash
        run: |
          set -euo pipefail

          test -d artifacts/tolk-stdlib
          test -d artifacts/fift-stdlib
          ls -lh artifacts artifacts/tolk-stdlib artifacts/fift-stdlib

      - name: Pack TON stdlib sources
        shell: bash
        # language=Bash
        run: |
          set -euo pipefail

          ARCHIVE_NAME="ton-stdlib.tar.gz"

          mkdir -p dist
          tar -C artifacts -czf "dist/${ARCHIVE_NAME}" \
            tolk-stdlib \
            fift-stdlib
          shasum -a 256 "dist/${ARCHIVE_NAME}" > "dist/${ARCHIVE_NAME}.sha256"

      - name: Upload TON stdlib artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ton-stdlib
          path: |
            dist/ton-stdlib.tar.gz
            dist/ton-stdlib.tar.gz.sha256
          retention-days: 1
          if-no-files-found: error

  create-release-objs-release:
    name: Create Release Objs Release
    needs: [ prepare, check-objs, generate-release-objs-manifest, package-stdlib-sources ]
    runs-on: ubicloud-standard-2-ubuntu-2204
    if: github.ref == 'refs/heads/master'

    permissions:
      actions: write
      contents: write

    steps:
      - name: Download TON objects artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ton-objs-*
          path: dist
          merge-multiple: true

      - name: Download TON stdlib artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ton-stdlib
          path: dist

      - name: Delete previous release-objs release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete release-objs --repo "${GITHUB_REPOSITORY}" -y || true

          gh api \
            repos/${GITHUB_REPOSITORY}/git/refs/tags/release-objs \
            -X DELETE || true

      - name: Create release-objs release
        env:
          GH_TOKEN: ${{ github.token }}
          TON_COMMIT: ${{ needs.prepare.outputs.ton_commit }}
        run: |
          release_notes=$(cat <<EOF
          Generated from TON commit: https://github.com/${TON_REPOSITORY}/commit/${TON_COMMIT}
          EOF
          )

          gh release create release-objs \
            --repo "${GITHUB_REPOSITORY}" \
            dist/* \
            --title "Release Objs" \
            --notes "${release_notes}" \
            --target "${GITHUB_SHA}" \
            --prerelease

      - name: Delete previous release-objs release and tag (mirror)
        if: env.ENABLE_MIRRORING_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTON_PUBLIC }}
        run: |
          gh release delete release-objs --repo "${PUBLIC_ACTON_REPOSITORY}" -y || true

          gh api \
            repos/${PUBLIC_ACTON_REPOSITORY}/git/refs/tags/release-objs \
            -X DELETE || true

      - name: Create release-objs release (mirror)
        if: env.ENABLE_MIRRORING_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTON_PUBLIC }}
          TON_COMMIT: ${{ needs.prepare.outputs.ton_commit }}
        run: |
          release_notes=$(cat <<EOF
          Generated from TON commit: https://github.com/${TON_REPOSITORY}/commit/${TON_COMMIT}
          Source Acton commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          EOF
          )

          gh release create release-objs \
            --repo "${PUBLIC_ACTON_REPOSITORY}" \
            dist/* \
            --title "Release Objs" \
            --notes "${release_notes}" \
            --prerelease
