name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  prepare:
    name: Prepare TON objects
    strategy: &runner_strategy
      matrix:
        include:
          - runner: ubicloud-standard-4-ubuntu-2204
            os: linux
            arch: x86_64
    runs-on: ${{ matrix.runner }}

    outputs:
      ton_commit: ${{ steps.ton-commit.outputs.commit }}

    steps:
      - name: Get TON commit hash
        id: ton-commit
        run: |
          TON_COMMIT=$(gh api -H "Accept: application/vnd.github.sha" repos/i582/ton/commits/pmakhnev/acton)
          echo "commit=$TON_COMMIT" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache TON artifacts
        id: cache-ton-objs
        uses: actions/cache/restore@v5
        with:
          path: objs
          key: ton-objs-${{ matrix.runner }}-${{ steps.ton-commit.outputs.commit }}

      - name: Check cache hits
        run: |
          echo 'TON artifacts: ${{ steps.cache-ton-objs.outputs.cache-hit }}'

      - name: Install LLVM and Clang
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Install system dependencies (cache not exist)
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config autoconf automake libssl-dev libtool zlib1g-dev libsecp256k1-dev libmicrohttpd-dev libsodium-dev liblz4-dev libjemalloc-dev ccache clang-16 llvm-16 libc++-16-dev libc++abi-16-dev
          echo "/usr/lib/llvm-16/bin" >> "$GITHUB_PATH"

      - name: Maximize Build Space
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Clone TON repository
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        uses: actions/checkout@v6
        with:
          repository: i582/ton
          ref: ${{ steps.ton-commit.outputs.commit }}
          fetch-depth: 1
          submodules: true
          path: ton-repo

      - name: Build TON static libraries
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        env:
          CC: clang-16
          CXX: clang++-16
          AR: llvm-ar-16
          RANLIB: llvm-ranlib-16
        run: |
          cd ton-repo
          cp assembly/native/build-ubuntu-static.sh .
          chmod +x build-ubuntu-static.sh
          ./build-ubuntu-static.sh -a -c

      - name: Show ccache stats
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        run: ccache -s

      - name: Collect TON objects
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        run: |
          mkdir -p objs
          cp ton-repo/artifacts/libemulator.a objs/
          cp ton-repo/artifacts/libtolk.a objs/

      - name: Cache TON objects
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: objs
          key: ton-objs-${{ matrix.runner }}-${{ steps.ton-commit.outputs.commit }}

  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    needs: [ prepare ]
    strategy: *runner_strategy
    runs-on: ${{ matrix.runner }}
    if: true

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.runner }}
          save-if: github.ref == 'refs/heads/master'

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,just

      - name: Restore TON objects
        uses: actions/cache/restore@v5
        with:
          path: objs
          key: ton-objs-${{ matrix.runner }}-${{ needs.prepare.outputs.ton_commit }}
          fail-on-cache-miss: true

      - name: Install LLVM and Clang
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Build acton binary
        env:
          CC: clang-16
          CXX: clang++-16
        run: |
          just build-ui
          just build

      - name: Add acton to PATH
        run: echo "${GITHUB_WORKSPACE}/target/release" >> "$GITHUB_PATH"

      - name: Test acton binary
        run: |
          acton --help

      - name: Run tests
        run: |
          just test

      - name: Run Acton tests
        run: |
          acton test

      - name: Prepare trunk archive
        if: github.ref == 'refs/heads/master'
        run: |
          tar -C target/release -czf target/release/acton-${{ matrix.os }}-${{ matrix.arch }}.tar.gz acton

      - name: Upload trunk archive artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: acton-${{ matrix.os }}-${{ matrix.arch }}
          path: target/release/acton-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  lint:
    name: Lint (${{ matrix.os }}-${{ matrix.arch }})
    needs: [ prepare ]
    strategy: *runner_strategy
    runs-on: ${{ matrix.runner }}
    if: true

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.runner }}
          save-if: github.ref == 'refs/heads/master'

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Restore TON objects
        uses: actions/cache/restore@v5
        with:
          path: objs
          key: ton-objs-${{ matrix.runner }}-${{ needs.prepare.outputs.ton_commit }}
          fail-on-cache-miss: true

      - name: Run formatter and linter
        run: |
          just check-ci

  create-trunk-release:
    name: Create Trunk Release
    needs: [ build ]
    runs-on: ubicloud-standard-2
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Download trunk archives
        uses: actions/download-artifact@v8
        with:
          pattern: acton-*
          path: artifacts/
          merge-multiple: true

      - name: Delete download artifacts
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          # language=JavaScript
          script: |
            const {
              data: artifacts
            } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            if (artifacts.total_count === 0) {
              core.warning('No downloadable artifacts to delete');
              return;
            } else {
              core.info(`Found ${artifacts.total_count} artifacts to delete`);
            }

            for (const artifact of artifacts.artifacts) {
              core.info(`Deleting artifact ${artifact.name} (${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }

      - name: Display structure of downloaded files
        run: ls -lhR artifacts

      - name: Delete previous trunk release and tag
        env:
          GH_TOKEN: ${{ secrets.ACTON_TOKEN }}
        run: |
          gh release delete trunk --repo "${GITHUB_REPOSITORY}" -y || true

          gh api \
            repos/${GITHUB_REPOSITORY}/git/refs/tags/trunk \
            -X DELETE || true

      - name: Create trunk release
        env:
          GH_TOKEN: ${{ secrets.ACTON_TOKEN }}
        run: |
          release_notes=$'Automated trunk build of Acton.\n\nBuilt from commit: '"${GITHUB_SHA}"

          gh release create trunk \
            --repo "${GITHUB_REPOSITORY}" \
            artifacts/* \
            --title "Trunk" \
            --notes "${release_notes}" \
            --prerelease \
            --target "${GITHUB_SHA}"
