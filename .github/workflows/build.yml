name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

env:
  ENABLE_MIRRORING_RELEASE: 'true'
  PUBLIC_ACTON_REPOSITORY: i582/acton-public

jobs:
  build-linux:
    name: Build Acton (${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}${{ matrix.abi && format('-{0}', matrix.abi) || '' }})
    strategy: &runner_linux_strategy
      matrix:
        include:
          - runner: ubicloud-standard-8-ubuntu-2204
            arch: x86_64
            vendor: unknown
            sys: linux
            abi: gnu
    runs-on: ${{ matrix.runner }}
    if: true
    env:
      TARGET_NAME: ${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}-${{ matrix.abi }}

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ runner.os }}-${{ runner.arch }}
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@d6e286fa45544157a02d45a43742857ebbc25d12 # v2.68.16
        with:
          tool: nextest,just

      - name: Download TON objects archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE_NAME="ton-objs-${TARGET_NAME}.tar.gz"
          mkdir -p objs
          gh release download trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${ARCHIVE_NAME}" \
            --dir "${RUNNER_TEMP}"
          tar -C objs -xzf "${RUNNER_TEMP}/${ARCHIVE_NAME}"

      - name: Install LLVM and Clang
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Build acton binary
        env:
          ACTON_RELEASE_CHANNEL: trunk
          CC: clang-16
          CXX: clang++-16
        run: |
          just build-ui
          cargo build --release --locked --target "${TARGET_NAME}" --bin acton

      - name: Add acton to PATH
        run: echo "${GITHUB_WORKSPACE}/target/${TARGET_NAME}/release" >> "$GITHUB_PATH"

      - name: Test acton binary
        run: |
          acton --help

      - name: Run tests
        run: |
          just test

      - name: Run Acton tests
        run: |
          acton test

      - name: Prepare trunk archive
        if: github.ref == 'refs/heads/master' && github.repository == 'ton-blockchain/acton'
        shell: bash
        # language=Bash
        run: |
          set -euo pipefail

          ARTIFACTS_DIR="acton-${TARGET_NAME}"
          ARCHIVE_NAME="${ARTIFACTS_DIR}.tar.gz"

          mkdir -p "${ARTIFACTS_DIR}"
          cp "target/${TARGET_NAME}/release/acton" "${ARTIFACTS_DIR}/acton"
          tar -czvf "${ARCHIVE_NAME}" -C "${ARTIFACTS_DIR}" .
          shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

      - name: Upload trunk archive artifact
        if: github.ref == 'refs/heads/master' && github.repository == 'ton-blockchain/acton'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artifacts-${{ env.TARGET_NAME }}
          path: |
            acton-${{ env.TARGET_NAME }}.tar.gz
            acton-${{ env.TARGET_NAME }}.tar.gz.sha256
          retention-days: 1
          if-no-files-found: error

      - name: Check Acton target binary
        shell: bash
        run: |
          python3 "${GITHUB_WORKSPACE}/.github/scripts/check-rust-target-binary.py" \
            --binary "${GITHUB_WORKSPACE}/target/${TARGET_NAME}/release/acton" \
            --target "${TARGET_NAME}"

  lint:
    name: Lint Acton (${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}-${{ matrix.abi }})
    strategy: *runner_linux_strategy
    runs-on: ${{ matrix.runner }}
    if: true
    env:
      TARGET_NAME: ${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}-${{ matrix.abi }}

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ runner.os }}-${{ runner.arch }}
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@d6e286fa45544157a02d45a43742857ebbc25d12 # v2.68.16
        with:
          tool: just,cargo-shear,typos-cli

      - name: Download TON objects archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE_NAME="ton-objs-${TARGET_NAME}.tar.gz"
          mkdir -p objs
          gh release download trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${ARCHIVE_NAME}" \
            --dir "${RUNNER_TEMP}"
          tar -C objs -xzf "${RUNNER_TEMP}/${ARCHIVE_NAME}"

      - name: Run formatter and linter
        run: |
          just check-ci

  ui:
    name: UI (${{ matrix.sys }}-${{ matrix.arch }})
    strategy: *runner_linux_strategy
    runs-on: ${{ matrix.runner }}
    if: true

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Installing additional Rust components
        uses: taiki-e/install-action@d6e286fa45544157a02d45a43742857ebbc25d12 # v2.68.16
        with:
          tool: just

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Install UI dependencies
        run: bun install

      - name: Run UI checks
        run: |
          just check-ui-ci

  build-macos:
    name: Build Acton (${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }})
    strategy: &runner_macos_strategy
      matrix:
        include:
          - runner: macos-15
            arch: aarch64
            vendor: apple
            sys: darwin
    runs-on: ${{ matrix.runner }}
    if: github.ref == 'refs/heads/master'
    env:
      TARGET_NAME: ${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ runner.os }}-${{ runner.arch }}
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@d6e286fa45544157a02d45a43742857ebbc25d12 # v2.68.16
        with:
          tool: nextest,just

      - name: Download TON objects archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE_NAME="ton-objs-${TARGET_NAME}.tar.gz"
          mkdir -p objs
          gh release download trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${ARCHIVE_NAME}" \
            --dir "${RUNNER_TEMP}"
          tar -C objs -xzf "${RUNNER_TEMP}/${ARCHIVE_NAME}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Build acton binary
        env:
          ACTON_RELEASE_CHANNEL: trunk
        run: |
          just build-ui
          cargo build --release --locked --target "${TARGET_NAME}" --bin acton

      - name: Add acton to PATH
        run: echo "${GITHUB_WORKSPACE}/target/${TARGET_NAME}/release" >> "$GITHUB_PATH"

      - name: Test acton binary
        run: |
          acton --help

      - name: Run tests
        run: |
          just test

      - name: Run Acton tests
        run: |
          acton test

      - name: Prepare trunk archive
        if: github.ref == 'refs/heads/master' && github.repository == 'ton-blockchain/acton'
        shell: bash
        # language=Bash
        run: |
          set -euo pipefail

          ARTIFACTS_DIR="acton-${TARGET_NAME}"
          ARCHIVE_NAME="${ARTIFACTS_DIR}.tar.gz"

          mkdir -p "${ARTIFACTS_DIR}"
          cp "target/${TARGET_NAME}/release/acton" "${ARTIFACTS_DIR}/acton"
          tar -czvf "${ARCHIVE_NAME}" -C "${ARTIFACTS_DIR}" .
          shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

      - name: Upload trunk archive artifact
        if: github.ref == 'refs/heads/master' && github.repository == 'ton-blockchain/acton'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artifacts-${{ env.TARGET_NAME }}
          path: |
            acton-${{ env.TARGET_NAME }}.tar.gz
            acton-${{ env.TARGET_NAME }}.tar.gz.sha256
          retention-days: 1
          if-no-files-found: error

      - name: Check Acton target binary
        shell: bash
        run: |
          python3 "${GITHUB_WORKSPACE}/.github/scripts/check-rust-target-binary.py" \
            --binary "${GITHUB_WORKSPACE}/target/${TARGET_NAME}/release/acton" \
            --target "${TARGET_NAME}"

  create-trunk-release:
    name: Create Trunk Release
    needs: [ build-linux, build-macos, lint, ui ]
    runs-on: ubicloud-standard-2-ubuntu-2204
    if: github.ref == 'refs/heads/master' && github.repository == 'ton-blockchain/acton'

    permissions:
      actions: write
      contents: write

    steps:
      - name: Download trunk archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true

      - name: Delete download artifacts
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ github.token }}
          # language=JavaScript
          script: |
            const {
              data: artifacts,
            } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            if (artifacts.total_count === 0) {
              core.warning('No downloadable artifacts to delete');
              return;
            } else {
              core.info(`Found ${artifacts.total_count} artifacts to delete`);
            }

            for (const artifact of artifacts.artifacts) {
              core.info(`Deleting artifact ${artifact.name} (${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }

      - name: Display structure of downloaded files
        run: ls -lhR artifacts

      - name: Delete previous trunk
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete trunk --repo "${GITHUB_REPOSITORY}" --cleanup-tag -y || true

          gh api \
            repos/${GITHUB_REPOSITORY}/git/refs/tags/trunk \
            -X DELETE || true

      - name: Create trunk release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_notes=$(cat <<EOF
          Automated trunk build of Acton.

          Built from source commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          EOF
          )

          gh release create trunk \
            --repo "${GITHUB_REPOSITORY}" \
            artifacts/* \
            --title "Trunk" \
            --notes "${release_notes}" \
            --target "${GITHUB_SHA}" \
            --prerelease

      - name: Delete previous trunk (mirror)
        if: env.ENABLE_MIRRORING_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTON_PUBLIC }}
        run: |
          gh release delete trunk --repo "${PUBLIC_ACTON_REPOSITORY}" --cleanup-tag -y || true

          gh api \
            repos/${PUBLIC_ACTON_REPOSITORY}/git/refs/tags/trunk \
            -X DELETE || true

      - name: Create trunk release (mirror)
        if: env.ENABLE_MIRRORING_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTON_PUBLIC }}
        run: |
          release_notes=$(cat <<EOF
          Automated trunk build of Acton.

          Built from source commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          EOF
          )

          gh release create trunk \
            --repo "${PUBLIC_ACTON_REPOSITORY}" \
            artifacts/* \
            --title "Trunk" \
            --notes "${release_notes}" \
            --prerelease
