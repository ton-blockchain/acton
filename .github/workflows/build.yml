name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  build-linux:
    name: Build Acton (${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}${{ matrix.abi && format('-{0}', matrix.abi) || '' }})
    strategy: &runner_linux_strategy
      matrix:
        include:
          - runner: ubicloud-standard-8-ubuntu-2204
            arch: x86_64
            vendor: unknown
            sys: linux
            abi: gnu
    runs-on: ${{ matrix.runner }}
    if: true
    env:
      TARGET_NAME: ${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}-${{ matrix.abi }}

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Cache Cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ runner.os }}-${{ runner.arch }}
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@d6e286fa45544157a02d45a43742857ebbc25d12 # v2.68.16
        with:
          tool: nextest,just

      - name: Download TON objects archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE_NAME="ton-objs-${TARGET_NAME}.tar.gz"
          mkdir -p objs
          gh release download trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${ARCHIVE_NAME}" \
            --dir "${RUNNER_TEMP}"
          tar -C objs -xzf "${RUNNER_TEMP}/${ARCHIVE_NAME}"

      - name: Install LLVM and Clang
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Build acton binary
        env:
          ACTON_RELEASE_CHANNEL: trunk
          CC: clang-16
          CXX: clang++-16
        run: |
          just build-ui
          cargo build --release --locked --target "${TARGET_NAME}" --bin acton

      - name: Add acton to PATH
        run: echo "${GITHUB_WORKSPACE}/target/${TARGET_NAME}/release" >> "$GITHUB_PATH"

      - name: Test acton binary
        run: |
          acton --help

      - name: Run tests
        run: |
          just test

      - name: Run Acton tests
        run: |
          acton test

      - name: Prepare trunk archive
        if: github.repository == 'ton-blockchain/acton'
        shell: bash
        # language=Bash
        run: |
          set -euo pipefail

          ARTIFACTS_DIR="acton-${TARGET_NAME}"
          ARCHIVE_NAME="${ARTIFACTS_DIR}.tar.gz"

          mkdir -p "${ARTIFACTS_DIR}"
          cp "target/${TARGET_NAME}/release/acton" "${ARTIFACTS_DIR}/acton"
          tar -czvf "${ARCHIVE_NAME}" -C "${ARTIFACTS_DIR}" .
          shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

      - name: Upload trunk archive artifact
        if: github.repository == 'ton-blockchain/acton'
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ env.TARGET_NAME }}
          path: |
            acton-${{ env.TARGET_NAME }}.tar.gz
            acton-${{ env.TARGET_NAME }}.tar.gz.sha256
          retention-days: 1
          if-no-files-found: error

  lint:
    name: Lint Acton (${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}-${{ matrix.abi }})
    strategy: *runner_linux_strategy
    runs-on: ${{ matrix.runner }}
    if: true
    env:
      TARGET_NAME: ${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}-${{ matrix.abi }}

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Cache Cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ runner.os }}-${{ runner.arch }}
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@d6e286fa45544157a02d45a43742857ebbc25d12 # v2.68.16
        with:
          tool: just,cargo-shear,typos-cli

      - name: Download TON objects archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE_NAME="ton-objs-${TARGET_NAME}.tar.gz"
          mkdir -p objs
          gh release download trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${ARCHIVE_NAME}" \
            --dir "${RUNNER_TEMP}"
          tar -C objs -xzf "${RUNNER_TEMP}/${ARCHIVE_NAME}"

      - name: Run formatter and linter
        run: |
          just check-ci

  ui:
    name: UI (${{ matrix.sys }}-${{ matrix.arch }})
    strategy: *runner_linux_strategy
    runs-on: ${{ matrix.runner }}
    if: true

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Installing additional Rust components
        uses: taiki-e/install-action@d6e286fa45544157a02d45a43742857ebbc25d12 # v2.68.16
        with:
          tool: just

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Install UI dependencies
        run: bun install

      - name: Run UI checks
        run: |
          just check-ui-ci

  build-macos:
    name: Build Acton (${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }})
    strategy: &runner_macos_strategy
      matrix:
        include:
          - runner: macos-15
            arch: aarch64
            vendor: apple
            sys: darwin
    runs-on: ${{ matrix.runner }}
    if: github.ref == 'refs/heads/master'
    env:
      TARGET_NAME: ${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Cache Cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ runner.os }}-${{ runner.arch }}
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@d6e286fa45544157a02d45a43742857ebbc25d12 # v2.68.16
        with:
          tool: nextest,just

      - name: Download TON objects archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE_NAME="ton-objs-${TARGET_NAME}.tar.gz"
          mkdir -p objs
          gh release download trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${ARCHIVE_NAME}" \
            --dir "${RUNNER_TEMP}"
          tar -C objs -xzf "${RUNNER_TEMP}/${ARCHIVE_NAME}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Build acton binary
        env:
          ACTON_RELEASE_CHANNEL: trunk
        run: |
          just build-ui
          cargo build --release --locked --target "${TARGET_NAME}" --bin acton

      - name: Add acton to PATH
        run: echo "${GITHUB_WORKSPACE}/target/${TARGET_NAME}/release" >> "$GITHUB_PATH"

      - name: Test acton binary
        run: |
          acton --help

      - name: Run tests
        run: |
          just test

      - name: Run Acton tests
        run: |
          acton test

      - name: Prepare trunk archive
        if: github.repository == 'ton-blockchain/acton'
        shell: bash
        # language=Bash
        run: |
          set -euo pipefail

          ARTIFACTS_DIR="acton-${TARGET_NAME}"
          ARCHIVE_NAME="${ARTIFACTS_DIR}.tar.gz"

          mkdir -p "${ARTIFACTS_DIR}"
          cp "target/${TARGET_NAME}/release/acton" "${ARTIFACTS_DIR}/acton"
          tar -czvf "${ARCHIVE_NAME}" -C "${ARTIFACTS_DIR}" .
          shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

      - name: Upload trunk archive artifact
        if: github.repository == 'ton-blockchain/acton'
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ env.TARGET_NAME }}
          path: |
            acton-${{ env.TARGET_NAME }}.tar.gz
            acton-${{ env.TARGET_NAME }}.tar.gz.sha256
          retention-days: 1
          if-no-files-found: error

  create-trunk-release:
    name: Create Trunk Release
    needs: [ build-linux, build-macos, lint, ui ]
    if: github.repository == 'ton-blockchain/acton'
    uses: ./.github/workflows/create-trunk-release.yml
    secrets: inherit
