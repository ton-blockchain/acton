name: Build and Check Acton

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build-linux:
    strategy:
      matrix:
        os: [ ubicloud-standard-4-ubuntu-2204 ]
    runs-on: ${{ matrix.os }}
    if: true

    outputs:
      arch: ${{ steps.detect-arch.outputs.arch }}

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,just

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@ebc0426251bc40c7cd31162802432c68818ab8f0 # v2.0.9
        with:
          # adds itself to PATH and LD_LIBRARY_PATH
          # accessible via env.LLVM_PATH
          version: "16.0.6"
          cached: true
          env: true # sets CC and CXX

      - name: Symlink LLVM and Clang
        run: |
          sudo ln -s libclang-11.so.1 /lib/x86_64-linux-gnu/libclang.so
          ls -s llvm-16 llvm
          cd ../bin
          ln -s lld-16 lld
          ln -s llvm-ar-16 llvm-ar
          ln -s llvm-ranlib-16 llvm-ranlib
          ln -s clang-16 clang
          ln -s clang++-16 clang++
        working-directory: ${{ env.LLVM_PATH }}/lib

      - name: Get TON commit hash
        id: ton-commit
        run: |
          TON_COMMIT=$(gh api -H "Accept: application/vnd.github.sha" repos/i582/ton/commits/pmakhnev/acton)
          echo "commit=$TON_COMMIT" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache TON artifacts
        id: cache-ton-artifacts
        uses: actions/cache@v5
        with:
          path: ton-repo/artifacts
          key: ton-artifacts-${{ matrix.os }}-${{ steps.ton-commit.outputs.commit }}
          restore-keys: ton-artifacts-${{ matrix.os }}-

      - name: Check cache hits
        run: |
          echo 'TON artifacts: ${{ steps.cache-ton-artifacts.outputs.cache-hit }}'

      - name: Install system dependencies (cache not exist)
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config autoconf automake libssl-dev libtool zlib1g-dev libsecp256k1-dev libmicrohttpd-dev libsodium-dev liblz4-dev libjemalloc-dev ccache graphviz

      - name: Install system dependencies (cache exist)
        if: steps.cache-ton-artifacts.outputs.cache-hit == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Maximize Build Space
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Clone TON repository
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        uses: actions/checkout@v6
        with:
          repository: i582/ton
          ref: pmakhnev/acton
          fetch-depth: 1
          submodules: true
          path: ton-repo

      - name: Build TON static libraries
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        run: |
          cd ton-repo
          mkdir -p ~/.ccache
          export CCACHE_DIR=~/.ccache
          ccache -M 0
          if [ ! -d "build" ]; then
            mkdir build
            cd build
          else
            cd build
            rm -rf .ninja* CMakeCache.txt
          fi
          if [ ! -d "../openssl_3" ]; then
            git clone https://github.com/openssl/openssl ../openssl_3
            cd ../openssl_3
            opensslPath=`pwd`
            git checkout openssl-3.1.4
            ./config
            make build_libs -j$(nproc)
            test $? -eq 0 || { echo "Can't compile openssl_3"; exit 1; }
            cd ../build
          else
            opensslPath=$(pwd)/../openssl_3
            echo "Using compiled openssl_3"
          fi
          cmake -GNinja -DTON_USE_JEMALLOC=ON .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DOPENSSL_ROOT_DIR=$opensslPath \
          -DOPENSSL_INCLUDE_DIR=$opensslPath/include \
          -DOPENSSL_CRYPTO_LIBRARY=$opensslPath/libcrypto.so \
          -DEMULATOR_STATIC=1
          test $? -eq 0 || { echo "Can't configure ton"; exit 1; }
          ninja emulator tolkfiftlib
          test $? -eq 0 || { echo "Can't compile ton"; exit 1; }
          emulator_deps=$(ninja -n -v emulator | tr ' ' '\n' | grep '\.a$' | sort -u)
          rm -f libemulator.a
          {
            echo "create libemulator.a"
            echo "addlib emulator/libemulator_static.a"
            echo "addlib emulator/libemulator.a"
            for a in $emulator_deps; do
              echo "addlib $a"
            done
            if [ -f /usr/lib/x86_64-linux-gnu/libsodium.a ]; then echo "addlib /usr/lib/x86_64-linux-gnu/libsodium.a"; fi
            if [ -f "$OPENSSL_CRYPTO_A" ]; then echo "addlib $OPENSSL_CRYPTO_A"; fi
            if [ -f /usr/lib/x86_64-linux-gnu/libz.a ]; then echo "addlib /usr/lib/x86_64-linux-gnu/libz.a"; fi
            echo "save"
            echo "end"
          } | llvm-ar -M
          ranlib libemulator.a
          rm -f libtolk.a
          llvm-objcopy-16 \
            --redefine-sym version=tolk_version \
            tolk/libtolkfiftlib.a \
            libtolk.a
          cd ..
          echo Creating artifacts...
          rm -rf artifacts
          mkdir artifacts
          cp build/libemulator.a artifacts/
          cp build/libtolk.a artifacts/
          cp -r crypto/smartcont/tolk-stdlib artifacts/tolk-stdlib
          cp -r crypto/fift/lib artifacts/fift-stdlib
          chmod -R +x artifacts/*

      - name: Show ccache stats
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        run: ccache -s

      - name: Copy TON artifacts to objs directory
        run: |
          mkdir -p objs
          cp ton-repo/artifacts/libemulator.a objs/
          cp ton-repo/artifacts/libtolk.a objs/

      - name: Detect architecture
        id: detect-arch
        run: echo "arch=$(uname -m)" >> $GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Build acton binary
        run: |
          just build-ui
          cargo build --bin acton

      - name: Test acton binary
        run: |
          ./target/debug/acton --help

      - name: Run tests
        run: |
          just test

      - name: Run Acton tests
        run: |
          ./target/debug/acton test

      - name: Run formatter and linter
        run: |
          just fmt
          just clippy

  create-canary-release:
    needs: [ build-linux ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v7
        with:
          name: acton-linux-binary
          path: binaries/linux/

      - name: Make binaries executable
        run: |
          chmod +x binaries/linux/acton

      - name: Create Linux archive
        run: |
          mkdir -p dist
          tar -czf dist/acton-linux-${{ needs.build-linux.outputs.arch }}.tar.gz \
            -C binaries/linux acton

      - name: Delete previous canary release and tag
        env:
          GH_TOKEN: ${{ secrets.ACTON_TOKEN }}
        run: |
          gh release delete canary -y || true

          gh api \
            repos/${GITHUB_REPOSITORY}/git/refs/tags/canary \
            -X DELETE || true

      - name: Create canary release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: canary
          release_name: Canary Build
          body: |
            Automated canary build of Acton.

            ## Archives

            - `acton-canary-linux-${{ needs.build-linux.outputs.arch }}.tar.gz` — Linux archive

            Built from commit: ${{ github.sha }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.ACTON_TOKEN }}

      - name: Upload Linux archive to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/acton-linux-${{ needs.build-linux.outputs.arch }}.tar.gz
          asset_name: acton-canary-linux-${{ needs.build-linux.outputs.arch }}.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.ACTON_TOKEN }}
