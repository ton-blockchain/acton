name: Build and Check Acton

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build-linux:
    strategy:
      matrix:
        os: [ubicloud-standard-4-ubuntu-2204]
    runs-on: ${{ matrix.os }}
    if: true

    outputs:
      arch: ${{ steps.detect-arch.outputs.arch }}

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,just

      - name: Get TON commit hash
        id: ton-commit
        run: |
          TON_COMMIT=$(gh api -H "Accept: application/vnd.github.sha" repos/i582/ton/commits/pmakhnev/acton)
          echo "commit=$TON_COMMIT" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache TON artifacts
        id: cache-ton-artifacts
        uses: actions/cache@v5
        with:
          path: ton-repo/artifacts
          key: ton-artifacts-${{ matrix.os }}-${{ steps.ton-commit.outputs.commit }}
          restore-keys: ton-artifacts-${{ matrix.os }}-

      - name: Check cache hit
        run: echo '${{ steps.cache-ton-artifacts.outputs.cache-hit }}'

      - name: Install LLVM and Clang
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Install system dependencies (cache not exist)
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config autoconf automake libssl-dev libtool zlib1g-dev libsecp256k1-dev libmicrohttpd-dev libsodium-dev liblz4-dev libjemalloc-dev ccache clang-16 llvm-16 libc++-16-dev libc++abi-16-dev graphviz
          echo "/usr/lib/llvm-16/bin" >> "$GITHUB_PATH"

      - name: Install system dependencies (cache exist)
        if: steps.cache-ton-artifacts.outputs.cache-hit == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Maximize Build Space
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Clone TON repository
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        uses: actions/checkout@v6
        with:
          repository: i582/ton
          ref: pmakhnev/acton
          fetch-depth: 1
          submodules: true
          path: ton-repo

      - name: Build TON static libraries
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        run: |
          export CC=clang-16
          export CXX=clang++-16
          export AR=llvm-ar-16
          export RANLIB=llvm-ranlib-16
          cd ton-repo
          cp assembly/native/build-ubuntu-static.sh .
          chmod +x build-ubuntu-static.sh
          ./build-ubuntu-static.sh -a -c

      - name: Show ccache stats
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        run: ccache -s

      - name: Copy TON artifacts to objs directory
        run: |
          mkdir -p objs
          cp ton-repo/artifacts/libemulator.a objs/
          cp ton-repo/artifacts/libtolk.a objs/

      - name: Detect architecture
        id: detect-arch
        run: echo "arch=$(uname -m)" >> $GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Build acton binary
        run: |
          export CC=clang-16
          export CXX=clang++-16
          just build-ui
          RUSTFLAGS="-C target-feature=-crt-static" cargo build --bin acton || {
            tmp=$(mktemp -d);
            pushd "$tmp";
            wget https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz;
            tar xJf zig-x86_64-linux-0.15.2.tar.xz
            export PATH="$PATH:$tmp/zig-x86_64-linux-0.15.2";
            popd;
            cargo install cargo-zigbuild;
            cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.35;
          }

      - name: Test acton binary
        run: |
          ./target/debug/acton --help

      - name: Run tests
        run: |
          just test

      - name: Run Acton tests
        run: |
          ./target/debug/acton test

      - name: Run formatter and linter
        run: |
          just fmt
          just clippy

  create-canary-release:
    needs: [ build-linux ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v7
        with:
          name: acton-linux-binary
          path: binaries/linux/

      - name: Make binaries executable
        run: |
          chmod +x binaries/linux/acton

      - name: Create Linux archive
        run: |
          mkdir -p dist
          tar -czf dist/acton-linux-${{ needs.build-linux.outputs.arch }}.tar.gz \
            -C binaries/linux acton

      - name: Delete previous canary release and tag
        env:
          GH_TOKEN: ${{ secrets.ACTON_TOKEN }}
        run: |
          gh release delete canary -y || true

          gh api \
            repos/${GITHUB_REPOSITORY}/git/refs/tags/canary \
            -X DELETE || true

      - name: Create canary release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: canary
          release_name: Canary Build
          body: |
            Automated canary build of Acton.

            ## Archives

            - `acton-canary-linux-${{ needs.build-linux.outputs.arch }}.tar.gz` — Linux archive

            Built from commit: ${{ github.sha }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.ACTON_TOKEN }}

      - name: Upload Linux archive to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/acton-linux-${{ needs.build-linux.outputs.arch }}.tar.gz
          asset_name: acton-canary-linux-${{ needs.build-linux.outputs.arch }}.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.ACTON_TOKEN }}
