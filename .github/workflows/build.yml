name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  prepare:
    name: Prepare TON objects
    strategy: &runner_strategy
      matrix:
        os:
          - ubicloud-standard-4-ubuntu-2204
    runs-on: ${{ matrix.os }}
    if: true

    outputs:
      ton_commit: ${{ steps.ton-commit.outputs.commit }}

    steps:
      - name: Get TON commit hash
        id: ton-commit
        run: |
          TON_COMMIT=$(gh api -H "Accept: application/vnd.github.sha" repos/i582/ton/commits/pmakhnev/acton)
          echo "commit=$TON_COMMIT" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache TON artifacts
        id: cache-ton-objs
        uses: actions/cache/restore@v5
        with:
          path: objs
          key: ton-objs-${{ matrix.os }}-${{ steps.ton-commit.outputs.commit }}

      - name: Check cache hits
        run: |
          echo 'TON artifacts: ${{ steps.cache-ton-objs.outputs.cache-hit }}'

      - name: Install LLVM and Clang
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Install system dependencies (cache not exist)
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config autoconf automake libssl-dev libtool zlib1g-dev libsecp256k1-dev libmicrohttpd-dev libsodium-dev liblz4-dev libjemalloc-dev ccache clang-16 llvm-16 libc++-16-dev libc++abi-16-dev
          echo "/usr/lib/llvm-16/bin" >> "$GITHUB_PATH"

      - name: Maximize Build Space
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Clone TON repository
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        uses: actions/checkout@v6
        with:
          repository: i582/ton
          ref: ${{ steps.ton-commit.outputs.commit }}
          fetch-depth: 1
          submodules: true
          path: ton-repo

      - name: Build TON static libraries
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        env:
          CC: clang-16
          CXX: clang++-16
          AR: llvm-ar-16
          RANLIB: llvm-ranlib-16
        run: |
          cd ton-repo
          cp assembly/native/build-ubuntu-static.sh .
          chmod +x build-ubuntu-static.sh
          ./build-ubuntu-static.sh -a -c

      - name: Show ccache stats
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        run: ccache -s

      - name: Collect TON objects
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        run: |
          mkdir -p objs
          cp ton-repo/artifacts/libemulator.a objs/
          cp ton-repo/artifacts/libtolk.a objs/

      - name: Cache TON objects
        if: steps.cache-ton-objs.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: objs
          key: ton-objs-${{ matrix.os }}-${{ steps.ton-commit.outputs.commit }}

  build:
    name: Build
    needs: [ prepare ]
    strategy: *runner_strategy
    runs-on: ${{ matrix.os }}
    if: true

    outputs:
      arch: ${{ steps.detect-arch.outputs.arch }}

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,just

      - name: Restore TON objects
        uses: actions/cache/restore@v5
        with:
          path: objs
          key: ton-objs-${{ matrix.os }}-${{ needs.prepare.outputs.ton_commit }}
          fail-on-cache-miss: true

      - name: Install LLVM and Clang
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Detect architecture
        id: detect-arch
        run: echo "arch=$(uname -m)" >> $GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Build acton binary
        env:
          CC: clang-16
          CXX: clang++-16
        run: |
          just build-ui
          cargo build --bin acton

      - name: Add acton to PATH
        run: echo "${GITHUB_WORKSPACE}/target/debug" >> "$GITHUB_PATH"

      - name: Test acton binary
        run: |
          acton --help

      - name: Run tests
        if: false
        run: |
          just test

      - name: Run Acton tests
        run: |
          acton test

  lint:
    name: Lint
    needs: [ prepare ]
    strategy: *runner_strategy
    runs-on: ${{ matrix.os }}
    if: true

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Restore TON objects
        uses: actions/cache/restore@v5
        with:
          path: objs
          key: ton-objs-${{ matrix.os }}-${{ needs.prepare.outputs.ton_commit }}
          fail-on-cache-miss: true

      - name: Run formatter and linter
        run: |
          just check-ci

  create-canary-release:
    name: Create Canary Release
    needs: [ build, lint ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v7
        with:
          name: acton-linux-binary
          path: binaries/linux/

      - name: Make binaries executable
        run: |
          chmod +x binaries/linux/acton

      - name: Create Linux archive
        run: |
          mkdir -p dist
          tar -czf dist/acton-linux-${{ needs.build-linux.outputs.arch }}.tar.gz \
            -C binaries/linux acton

      - name: Delete previous canary release and tag
        env:
          GH_TOKEN: ${{ secrets.ACTON_TOKEN }}
        run: |
          gh release delete canary -y || true

          gh api \
            repos/${GITHUB_REPOSITORY}/git/refs/tags/canary \
            -X DELETE || true

      - name: Create canary release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: canary
          release_name: Canary Build
          body: |
            Automated canary build of Acton.

            ## Archives

            - `acton-canary-linux-${{ needs.build-linux.outputs.arch }}.tar.gz` — Linux archive

            Built from commit: ${{ github.sha }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.ACTON_TOKEN }}

      - name: Upload Linux archive to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/acton-linux-${{ needs.build-linux.outputs.arch }}.tar.gz
          asset_name: acton-canary-linux-${{ needs.build-linux.outputs.arch }}.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.ACTON_TOKEN }}
