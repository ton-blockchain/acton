name: Release Acton

on:
  release:
    types: [ released ]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

env:
  CARGO_DIST_VERSION: "0.31.0"

jobs:
  check-versions:
    name: Check Release Versions
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}

      - name: Check versions match tag
        env:
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        # language=Bash
        run: |
          set -euo pipefail

          raw_tag="${RAW_TAG}"

          if [[ -z "${raw_tag}" ]]; then
            echo "::error title=Missing tag::No release tag was provided"
            exit 1
          fi

          if [[ "${raw_tag}" != v* ]]; then
            echo "::error title=Invalid tag::Tag '${raw_tag}' must start with 'v'"
            exit 1
          fi

          tag_version="${raw_tag:1}"

          acton_version="$(yq -r '.package.version' Acton.toml)"
          cargo_version="$(yq -r '.workspace.package.version' Cargo.toml)"
          package_version="$(jq -r '.version' package.json)"

          has_errors=0

          if [[ "${acton_version}" != "${tag_version}" ]]; then
            echo "::error title=Version mismatch::Acton.toml(version) '${acton_version}' does not match tag '${tag_version}'"
            has_errors=1
          fi

          if [[ "${cargo_version}" != "${tag_version}" ]]; then
            echo "::error title=Version mismatch::Cargo.toml(workspace.package.version) '${cargo_version}' does not match tag '${tag_version}'"
            has_errors=1
          fi

          if [[ "${package_version}" != "${tag_version}" ]]; then
            echo "::error title=Version mismatch::package.json(version) '${package_version}' does not match tag '${tag_version}'"
            has_errors=1
          fi

          if [[ "${has_errors}" -ne 0 ]]; then
            exit 1
          fi

          echo "All versions match ${tag_version}"
          exit 0

  build-local-artifacts:
    name: Build Local Artifacts (${{ matrix.target }})
    needs: [ check-versions ]
    strategy:
      matrix:
        include:
          - runner: ubicloud-standard-4-ubuntu-2204
            target: x86_64-unknown-linux-gnu
          - runner: ubicloud-standard-4-arm-ubuntu-2204
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      TARGET_TRIPLE: ${{ matrix.target }}
      BUILD_MANIFEST_NAME: target/distrib/${{ matrix.target }}-dist-manifest.json

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ matrix.runner }}
          save-if: false

      - name: Install Rust
        run: rustup toolchain install

      - name: Install cargo-dist
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf "https://github.com/axodotdev/cargo-dist/releases/download/v${CARGO_DIST_VERSION}/cargo-dist-installer.sh" | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install LLVM and Clang (Linux only)
        if: runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Configure Linux compiler env
        if: runner.os == 'Linux'
        run: |
          echo "CC=clang-16" >> "$GITHUB_ENV"
          echo "CXX=clang++-16" >> "$GITHUB_ENV"

      - name: Download TON objects archive
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          case "${TARGET_TRIPLE}" in
            x86_64-unknown-linux-gnu) archive_name="ton-objs-linux-x86_64.tar.gz" ;;
            aarch64-unknown-linux-gnu) archive_name="ton-objs-linux-aarch64.tar.gz" ;;
            x86_64-apple-darwin) archive_name="ton-objs-macos-x86_64.tar.gz" ;;
            aarch64-apple-darwin) archive_name="ton-objs-macos-aarch64.tar.gz" ;;
            *)
              echo "unsupported target: ${TARGET_TRIPLE}" >&2
              exit 1
              ;;
          esac

          mkdir -p dist objs
          gh release download trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${archive_name}" \
            --dir dist
          tar -C objs -xzf "dist/${archive_name}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Build embedded UI assets
        shell: bash
        run: |
          set -euo pipefail
          bun install
          cd crates/acton-test-ui
          bun i
          bun run build
          cd ../acton-litenode-ui
          bun i
          bun run build

      - name: Build local cargo-dist artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/distrib
          dist build --artifacts=local --target "${TARGET_TRIPLE}" --tag "${RELEASE_TAG}" --allow-dirty --output-format=json > dist-manifest.json
          cp dist-manifest.json "${BUILD_MANIFEST_NAME}"

      - id: cargo-dist
        name: Collect upload paths
        shell: bash
        run: |
          {
            echo "paths<<EOF"
            dist print-upload-files-from-manifest --manifest dist-manifest.json
            echo "${BUILD_MANIFEST_NAME}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload local cargo-dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-local-${{ matrix.target }}
          path: ${{ steps.cargo-dist.outputs.paths }}
          retention-days: 1

  build-global-artifacts:
    name: Build Global Artifacts
    needs: [ build-local-artifacts ]
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}

      - name: Install Rust
        run: rustup toolchain install

      - name: Install cargo-dist
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf "https://github.com/axodotdev/cargo-dist/releases/download/v${CARGO_DIST_VERSION}/cargo-dist-installer.sh" | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Download local cargo-dist artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-local-*
          path: target/distrib/
          merge-multiple: true

      - name: Build global cargo-dist artifacts
        shell: bash
        run: |
          set -euo pipefail
          dist build --artifacts=global --tag "${RELEASE_TAG}" --allow-dirty --output-format=json > dist-manifest.json
          cp dist-manifest.json "${BUILD_MANIFEST_NAME}"

      - id: cargo-dist
        name: Collect upload paths
        shell: bash
        run: |
          {
            echo "paths<<EOF"
            dist print-upload-files-from-manifest --manifest dist-manifest.json
            echo "${BUILD_MANIFEST_NAME}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload global cargo-dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-global
          path: ${{ steps.cargo-dist.outputs.paths }}
          retention-days: 1

  create-release:
    needs: [ build-local-artifacts, build-global-artifacts ]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download local cargo-dist artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-local-*
          path: dist/
          merge-multiple: true

      - name: Download global cargo-dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-global
          path: dist/

      - name: Download TON objects release archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "ton-objs-*.tar.gz" \
            --dir dist

      - name: Display structure of downloaded files
        run: ls -lhR dist

      - name: Upload release archives
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find dist -type f ! -name '*-dist-manifest.json' | sort)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "no release files found" >&2
            exit 1
          fi
          gh release upload "${RELEASE_TAG}" "${files[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
