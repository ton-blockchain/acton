name: Release Acton

on:
  release:
    types: [ released ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  check-versions:
    name: Check Release Versions
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        if: github.event_name == 'release'
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check versions match tag
        if: github.event_name == 'release'
        env:
          RAW_TAG: ${{ github.event.release.tag_name }}
        # language=Bash
        run: |
          set -euo pipefail

          raw_tag="${RAW_TAG}"

          if [[ "${raw_tag}" != v* ]]; then
            echo "::error title=Invalid tag::Tag '${raw_tag}' must start with 'v'"
            exit 1
          fi

          tag_version="${raw_tag:1}"

          acton_version="$(yq -r '.package.version' Acton.toml)"
          cargo_version="$(yq -r '.workspace.package.version' Cargo.toml)"
          package_version="$(jq -r '.version' package.json)"

          has_errors=0

          if [[ "${acton_version}" != "${tag_version}" ]]; then
            echo "::error title=Version mismatch::Acton.toml(version) '${acton_version}' does not match tag '${tag_version}'"
            has_errors=1
          fi

          if [[ "${cargo_version}" != "${tag_version}" ]]; then
            echo "::error title=Version mismatch::Cargo.toml(workspace.package.version) '${cargo_version}' does not match tag '${tag_version}'"
            has_errors=1
          fi

          if [[ "${package_version}" != "${tag_version}" ]]; then
            echo "::error title=Version mismatch::package.json(version) '${package_version}' does not match tag '${tag_version}'"
            has_errors=1
          fi

          if [[ "${has_errors}" -ne 0 ]]; then
            exit 1
          fi

          echo "All versions match ${tag_version}"
          exit 0

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    needs: [ check-versions ]
    strategy:
      matrix:
        include:
          - runner: ubicloud-standard-4-ubuntu-2204
            os: linux
            arch: x86_64
          - runner: ubicloud-standard-4-arm-ubuntu-2204
            os: linux
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    if: true

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Cache Cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ matrix.runner }}
          save-if: false

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@d6e286fa45544157a02d45a43742857ebbc25d12 # v2.68.16
        with:
          tool: just

      - name: Install LLVM and Clang (don't cache)
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Download TON objects archive
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE_NAME: ton-objs-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
        run: |
          mkdir -p dist objs
          gh release download trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${ARCHIVE_NAME}" \
            --dir dist
          tar -C objs -xzf "dist/${ARCHIVE_NAME}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Build acton binary
        env:
          CC: clang-16
          CXX: clang++-16
        run: |
          just build-ui
          cargo build --profile release-size --bin acton

      - name: Test acton binary
        run: |
          ./target/release-size/acton --help

      - name: Prepare Acton archive
        if: github.event_name == 'release'
        env:
          ARCHIVE_NAME: acton-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
        run: |
          mkdir -p dist
          tar -czf "dist/${ARCHIVE_NAME}" -C target/release-size acton

      - name: Upload Acton archive as artifact
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v7
        with:
          name: acton-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/acton-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          retention-days: 1

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    needs: [ check-versions ]
    strategy:
      matrix:
        include:
          - runner: macos-15-large
            os: macos
            arch: x86_64
          - runner: macos-15
            os: macos
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    if: true

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Cache Cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ matrix.runner }}
          save-if: false

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@d6e286fa45544157a02d45a43742857ebbc25d12 # v2.68.16
        with:
          tool: just

      - name: Download TON objects archive
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE_NAME: ton-objs-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
        run: |
          mkdir -p dist objs
          gh release download trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${ARCHIVE_NAME}" \
            --dir dist
          tar -C objs -xzf "dist/${ARCHIVE_NAME}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Build acton binary
        run: |
          just build-ui
          cargo build --profile release-size --bin acton

      - name: Test acton binary
        run: |
          ./target/release-size/acton --help

      - name: Prepare Acton archive
        if: github.event_name == 'release'
        env:
          ARCHIVE_NAME: acton-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
        run: |
          mkdir -p dist
          tar -czf "dist/${ARCHIVE_NAME}" -C target/release-size acton

      - name: Upload Acton archive as artifact
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v7
        with:
          name: acton-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/acton-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          retention-days: 1

  create-release:
    needs: [ build-linux, build-macos ]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    permissions:
      contents: read

    steps:
      - name: Download Acton release archives
        uses: actions/download-artifact@v8
        with:
          pattern: acton-*
          path: dist/
          merge-multiple: true

      - name: Download TON objects release archives
        env:
          GH_TOKEN: ${{ secrets.ACTON_TOKEN }}
        run: |
          gh release download trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "ton-objs-*.tar.gz" \
            --dir dist

      - name: Upload release archives
        env:
          GH_TOKEN: ${{ secrets.ACTON_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "${RELEASE_TAG}" dist/*.tar.gz \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
