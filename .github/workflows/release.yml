name: Release Acton

on:
  release:
    types: [ published ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      matrix:
        os: [ ubicloud-standard-4-ubuntu-2204 ]
    runs-on: ${{ matrix.os }}
    if: true

    outputs:
      arch: ${{ steps.detect-arch.outputs.arch }}

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
          save-if: false

      - name: Install Rust
        run: rustup toolchain install

      - name: Installing additional Rust components
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,just

      - name: Install LLVM and Clang (don't cache)
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Get TON commit hash
        id: ton-commit
        run: |
          TON_COMMIT=$(gh api -H "Accept: application/vnd.github.sha" repos/i582/ton/commits/pmakhnev/acton)
          echo "commit=$TON_COMMIT" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache TON artifacts
        uses: actions/cache/restore@v5
        with:
          path: ton-repo/artifacts
          key: ton-artifacts-${{ matrix.os }}-${{ steps.ton-commit.outputs.commit }}
          restore-keys: ton-artifacts-${{ matrix.os }}-
          fail-on-cache-miss: true

      - name: Install system dependencies (cache exist)
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Copy TON artifacts to objs directory
        run: |
          mkdir -p objs
          cp ton-repo/artifacts/libemulator.a objs/
          cp ton-repo/artifacts/libtolk.a objs/

      - name: Detect architecture
        id: detect-arch
        run: echo "arch=$(uname -m)" >> $GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Build acton binary
        env:
          CC: clang-16
          CXX: clang++-16
        run: |
          just build-ui
          cargo build --profile release-size --bin acton

      - name: Test acton binary
        run: |
          ./target/release-size/acton --help

      - name: Upload acton binary as artifact
        uses: actions/upload-artifact@v6
        with:
          name: acton-linux-binary
          path: target/release-size/acton

  create-release:
    needs: [ build-linux ]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v7
        with:
          name: acton-linux-binary
          path: binaries/linux/

      - name: Make binaries executable
        run: |
          chmod +x binaries/linux/acton

      - name: Create Linux archive
        run: |
          mkdir -p dist
          tar -czf dist/acton-linux-${{ needs.build-linux.outputs.arch }}.tar.gz \
            -C binaries/linux acton

      - name: Upload Linux archive to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/acton-linux-${{ needs.build-linux.outputs.arch }}.tar.gz
          asset_name: acton-linux-${{ needs.build-linux.outputs.arch }}.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.ACTON_TOKEN }}
