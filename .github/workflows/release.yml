name: Release Acton

on:
  push:
    tags:
      - v*
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

env:
  ENABLE_MIRRORING_RELEASE: 'true'
  PUBLIC_ACTON_REPOSITORY: i582/acton-public

jobs:
  check-versions:
    name: Check Release Versions
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        if: github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check versions match tag
        if: github.event_name == 'push'
        env:
          RAW_TAG: ${{ github.ref_name }}
        # language=Bash
        run: |
          set -euo pipefail

          raw_tag="${RAW_TAG}"

          if [[ "${raw_tag}" != v* ]]; then
            echo "::error title=Invalid tag::Tag '${raw_tag}' must start with 'v'"
            exit 1
          fi

          tag_version="${raw_tag:1}"

          acton_version="$(yq -r '.package.version' Acton.toml)"
          cargo_version="$(yq -r '.workspace.package.version' Cargo.toml)"
          package_version="$(jq -r '.version' package.json)"

          has_errors=0

          if [[ "${acton_version}" != "${tag_version}" ]]; then
            echo "::error title=Version mismatch::Acton.toml(version) '${acton_version}' does not match tag '${tag_version}'"
            has_errors=1
          fi

          if [[ "${cargo_version}" != "${tag_version}" ]]; then
            echo "::error title=Version mismatch::Cargo.toml(workspace.package.version) '${cargo_version}' does not match tag '${tag_version}'"
            has_errors=1
          fi

          if [[ "${package_version}" != "${tag_version}" ]]; then
            echo "::error title=Version mismatch::package.json(version) '${package_version}' does not match tag '${tag_version}'"
            has_errors=1
          fi

          if [[ "${has_errors}" -ne 0 ]]; then
            exit 1
          fi

          echo "All versions match ${tag_version}"
          exit 0

  build-release-binaries:
    needs: [ check-versions ]

    permissions:
      contents: read

    uses: ./.github/workflows/build-release-binaries.yml

  create-release:
    needs: [ build-release-binaries ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Download Acton release archives
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: dist/
          merge-multiple: true

      - name: Download TON objects release archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "ton-objs-*.tar.gz" \
            --dir dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "${RELEASE_TAG}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${RELEASE_TAG}" \
            --latest \
            --verify-tag \
            --generate-notes

      - name: Create GitHub release (mirror)
        if: env.ENABLE_MIRRORING_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTON_PUBLIC }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          release_notes=$(cat <<EOF
          Mirror of Acton release ${RELEASE_TAG}.

          Source release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}
          Source commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          EOF
          )

          gh release create "${RELEASE_TAG}" dist/* \
            --repo "${PUBLIC_ACTON_REPOSITORY}" \
            --title "${RELEASE_TAG}" \
            --latest \
            --notes "${release_notes}"
