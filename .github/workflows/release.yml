name: Release Acton

on:
  release:
    types: [ published ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    if: true

    outputs:
      arch: ${{ steps.detect-arch.outputs.arch }}

    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Check out Acton repository
        uses: actions/checkout@v6

      - name: Install Rust
        run: rustup toolchain install

      - name: Cache Cargo registry + git + target
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install required system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git cmake ninja-build pkg-config autoconf automake libssl-dev libtool zlib1g-dev libsecp256k1-dev libmicrohttpd-dev libsodium-dev liblz4-dev libjemalloc-dev ccache clang-16 llvm-16 libc++-16-dev libc++abi-16-dev just graphviz
          echo "/usr/lib/llvm-16/bin" >> "$GITHUB_PATH"

      - name: Clone TON repository
        run: |
          git clone https://github.com/i582/ton.git --branch pmakhnev/acton --single-branch --depth=1 ton-repo
          cd ton-repo

      - name: Get TON commit hash
        id: ton-commit
        run: |
          TON_COMMIT=$(git ls-remote https://github.com/i582/ton.git pmakhnev/acton | cut -f1)
          echo "commit=$TON_COMMIT" >> $GITHUB_OUTPUT

      - name: Cache TON build directory
        id: cache-ton-build
        uses: actions/cache/restore@v5
        with:
          path: ton-repo/build
          key: ton-build-${{ runner.os }}-${{ steps.ton-commit.outputs.commit }}
          restore-keys: ton-build-${{ runner.os }}-

      - name: Cache TON artifacts
        id: cache-ton-artifacts
        uses: actions/cache/restore@v5
        with:
          path: ton-repo/artifacts
          key: ton-artifacts-${{ runner.os }}-${{ steps.ton-commit.outputs.commit }}
          restore-keys: ton-artifacts-${{ runner.os }}-

      - name: Check cache hit
        run: echo '${{ steps.cache-ton-artifacts.outputs.cache-hit }}'

      - name: Cache TON dependencies (OpenSSL, LZ4, Zlib)
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        id: cache-ton-deps
        uses: actions/cache/restore@v5
        with:
          path: |
            ton-repo/openssl_3
            ton-repo/lz4
            ton-repo/zlib
          key: ton-deps-${{ runner.os }}-${{ steps.ton-commit.outputs.commit }}
          restore-keys: ton-deps-${{ runner.os }}-

      - name: Cache ccache
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v5
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ steps.ton-commit.outputs.commit }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Init submodules for build
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        run: |
          cd ton-repo && git submodule update --init --recursive

      - name: Build TON static libraries
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        run: |
          export CC=clang-16
          export CXX=clang++-16
          export AR=llvm-ar-16
          export RANLIB=llvm-ranlib-16
          cd ton-repo
          cp assembly/native/build-ubuntu-static.sh .
          chmod +x build-ubuntu-static.sh
          ./build-ubuntu-static.sh -a -c

      - name: Show ccache stats
        if: steps.cache-ton-artifacts.outputs.cache-hit != 'true'
        run: ccache -s

      - name: Copy TON artifacts to objs directory
        run: |
          mkdir -p objs
          cp ton-repo/artifacts/libemulator.a objs/
          cp ton-repo/artifacts/libtolk.a objs/

      - name: Detect architecture
        id: detect-arch
        run: echo "arch=$(uname -m)" >> $GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Build acton binary
        env:
          CC: gcc
          CXX: g++
        run: |
          just build-ui
          cargo build --profile release-size --bin acton

      - name: Test acton binary
        run: |
          ./target/release-size/acton --help

      - name: Upload acton binary as artifact
        uses: actions/upload-artifact@v6
        with:
          name: acton-linux-binary
          path: target/release-size/acton

  create-release:
    needs: [ build-linux ]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v7
        with:
          name: acton-linux-binary
          path: binaries/linux/

      - name: Make binaries executable
        run: |
          chmod +x binaries/linux/acton

      - name: Create Linux archive
        run: |
          mkdir -p dist
          tar -czf dist/acton-linux-${{ needs.build-linux.outputs.arch }}.tar.gz \
            -C binaries/linux acton

      - name: Upload Linux archive to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/acton-linux-${{ needs.build-linux.outputs.arch }}.tar.gz
          asset_name: acton-linux-${{ needs.build-linux.outputs.arch }}.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.ACTON_TOKEN }}
