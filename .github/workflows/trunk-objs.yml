name: Release TON Objs

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  build_objs:
    name: Prepare TON objects (${{ matrix.os }}-${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - runner: ubicloud-standard-4-ubuntu-2204
            os: linux
            arch: x86_64
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read

    outputs:
      ton_commit: ${{ steps.ton-commit.outputs.commit }}

    steps:
      - name: Get TON commit hash
        id: ton-commit
        run: |
          TON_COMMIT=$(gh api -H "Accept: application/vnd.github.sha" repos/i582/ton/commits/pmakhnev/acton)
          echo "commit=$TON_COMMIT" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install LLVM and Clang
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config autoconf automake libssl-dev libtool zlib1g-dev libsecp256k1-dev libmicrohttpd-dev libsodium-dev liblz4-dev libjemalloc-dev ccache clang-16 llvm-16 libc++-16-dev libc++abi-16-dev
          echo "/usr/lib/llvm-16/bin" >> "$GITHUB_PATH"

      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Clone TON repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          repository: i582/ton
          ref: ${{ steps.ton-commit.outputs.commit }}
          fetch-depth: 1
          submodules: true
          path: ton-repo

      - name: Build TON static libraries
        env:
          CC: clang-16
          CXX: clang++-16
          AR: llvm-ar-16
          RANLIB: llvm-ranlib-16
        run: |
          cd ton-repo
          cp assembly/native/build-ubuntu-static.sh .
          chmod +x build-ubuntu-static.sh
          ./build-ubuntu-static.sh -a -c

      - name: Show ccache stats
        run: ccache -s

      - name: Collect TON objects
        run: |
          mkdir -p objs
          cp ton-repo/artifacts/libemulator.a objs/
          cp ton-repo/artifacts/libtolk.a objs/

      - name: Generate TON artifacts lock file
        run: |
          libemulator_sha256=$(sha256sum objs/libemulator.a | awk '{ print $1 }')
          libtolk_sha256=$(sha256sum objs/libtolk.a | awk '{ print $1 }')

          jq -n \
            --arg ton_commit "${{ steps.ton-commit.outputs.commit }}" \
            --arg libemulator_sha256 "${libemulator_sha256}" \
            --arg libtolk_sha256 "${libtolk_sha256}" \
            '{
              ton_commit: $ton_commit,
              sha256_libemulator: $libemulator_sha256,
              sha256_libtolk: $libtolk_sha256
            }' > objs/ton-artifacts.lock

      - name: Validate TON objects
        run: |
          ls -lh objs
          test -f objs/libemulator.a
          test -f objs/libtolk.a
          test -f objs/ton-artifacts.lock
          cat objs/ton-artifacts.lock

      - name: Pack TON objects
        run: |
          mkdir -p dist
          tar -C objs -czf dist/ton-objs-${{ matrix.os }}-${{ matrix.arch }}.tar.gz \
            libemulator.a \
            libtolk.a \
            ton-artifacts.lock

      - name: Upload TON objects artifact
        uses: actions/upload-artifact@v7
        with:
          name: ton-objs-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/ton-objs-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  create-trunk-objs-release:
    name: Create Trunk Objs Release
    needs: [ build_objs ]
    runs-on: ubicloud-standard-2

    permissions:
      contents: read

    steps:
      - name: Download TON objects artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ton-objs-*
          path: dist
          merge-multiple: true

      - name: Delete previous trunk-objs release and tag
        env:
          GH_TOKEN: ${{ secrets.ACTON_TOKEN }}
        run: |
          gh release delete trunk-objs --repo "${GITHUB_REPOSITORY}" -y || true

          gh api \
            repos/${GITHUB_REPOSITORY}/git/refs/tags/trunk-objs \
            -X DELETE || true

      - name: Create trunk-objs release
        env:
          GH_TOKEN: ${{ secrets.ACTON_TOKEN }}
        run: |
          release_notes=$'Automated trunk build of TON object files for Acton.\n\nActon commit: '"${GITHUB_SHA}"$'\nTON commit: '"${{ needs.build_objs.outputs.ton_commit }}"

          gh release create trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            dist/*.tar.gz \
            --title "Trunk Objs" \
            --notes "${release_notes}" \
            --prerelease \
            --target "${GITHUB_SHA}"
