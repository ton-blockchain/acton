name: Release TON Objs

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

env:
  TON_REPOSITORY: i582/ton

  ENABLE_MIRRORING_RELEASE: 'true'
  PUBLIC_ACTON_REPOSITORY: i582/acton-public

jobs:
  prepare:
    name: Resolve TON Commit
    runs-on: ubicloud-standard-2-ubuntu-2204

    permissions:
      contents: read

    outputs:
      ton_commit: ${{ steps.ton-commit.outputs.commit }}

    steps:
      - name: Get TON commit hash
        id: ton-commit
        run: |
          TON_COMMIT=$(gh api -H "Accept: application/vnd.github.sha" "repos/${TON_REPOSITORY}/commits/pmakhnev/acton")
          echo "commit=$TON_COMMIT" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

  build-objs-linux:
    name: Prepare TON objects (${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}-${{ matrix.abi }})
    needs: [ prepare ]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubicloud-standard-8-ubuntu-2204
            arch: x86_64
            vendor: unknown
            sys: linux
            abi: gnu
          - runner: ubicloud-standard-8-arm-ubuntu-2204
            arch: aarch64
            vendor: unknown
            sys: linux
            abi: gnu
    env:
      TARGET_NAME: ${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}-${{ matrix.abi }}

    permissions:
      contents: read

    steps:
      - name: Restore TON objects archive cache
        id: archive-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz.sha256
          key: ton-objs-${{ env.TARGET_NAME }}-${{ needs.prepare.outputs.ton_commit }}

      - name: Install LLVM and Clang
        if: steps.archive-cache.outputs.cache-hit != 'true'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 16 clang
          rm llvm.sh

      - name: Install system dependencies
        if: steps.archive-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config autoconf automake libssl-dev libtool zlib1g-dev libsecp256k1-dev libmicrohttpd-dev libsodium-dev liblz4-dev libjemalloc-dev ccache clang-16 llvm-16 libc++-16-dev libc++abi-16-dev
          echo "/usr/lib/llvm-16/bin" >> "$GITHUB_PATH"

      - name: Maximize Build Space
        if: steps.archive-cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Clone TON repository
        if: steps.archive-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ env.TON_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.ton_commit }}
          fetch-depth: 1
          submodules: true
          path: ton-repo

      - name: Build TON static libraries
        if: steps.archive-cache.outputs.cache-hit != 'true'
        env:
          CC: clang-16
          CXX: clang++-16
          AR: llvm-ar-16
          RANLIB: llvm-ranlib-16
        run: |
          cd ton-repo
          cp assembly/native/build-ubuntu-static.sh .
          chmod +x build-ubuntu-static.sh
          ./build-ubuntu-static.sh -a -c

      - name: Show ccache stats
        if: steps.archive-cache.outputs.cache-hit != 'true'
        run: ccache -s

      - name: Collect TON objects
        if: steps.archive-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p objs
          cp ton-repo/artifacts/libemulator.a objs/
          cp ton-repo/artifacts/libtolk.a objs/

      - name: Generate TON artifacts lock file
        if: steps.archive-cache.outputs.cache-hit != 'true'
        env:
          TON_COMMIT: ${{ needs.prepare.outputs.ton_commit }}
        # language=Bash
        run: |
          libemulator_sha256=$(sha256sum objs/libemulator.a | awk '{ print $1 }')
          libtolk_sha256=$(sha256sum objs/libtolk.a | awk '{ print $1 }')

          jq -n \
            --arg ton_commit "${TON_COMMIT}" \
            --arg rust_target "${TARGET_NAME}" \
            --arg libemulator_sha256 "${libemulator_sha256}" \
            --arg libtolk_sha256 "${libtolk_sha256}" \
            '{
              ton_commit: $ton_commit,
              rust_target: $rust_target,
              sha256_libemulator: $libemulator_sha256,
              sha256_libtolk: $libtolk_sha256
            }' > objs/ton-artifacts.lock

      - name: Validate TON objects
        if: steps.archive-cache.outputs.cache-hit != 'true'
        run: |
          ls -lh objs
          test -f objs/libemulator.a
          test -f objs/libtolk.a
          test -f objs/ton-artifacts.lock
          cat objs/ton-artifacts.lock

      - name: Pack TON objects
        if: steps.archive-cache.outputs.cache-hit != 'true'
        # language=Bash
        run: |
          ARCHIVE_NAME="ton-objs-${TARGET_NAME}.tar.gz"

          mkdir -p dist
          tar -C objs -czf "dist/${ARCHIVE_NAME}" \
            libemulator.a \
            libtolk.a \
            ton-artifacts.lock
          shasum -a 256 "dist/${ARCHIVE_NAME}" > "dist/${ARCHIVE_NAME}.sha256"

      - name: Save TON objects archive cache
        if: github.ref == 'refs/heads/master' && steps.archive-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz.sha256
          key: ton-objs-${{ env.TARGET_NAME }}-${{ needs.prepare.outputs.ton_commit }}

      - name: Upload TON objects artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ton-objs-${{ env.TARGET_NAME }}
          path: |
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz.sha256
          retention-days: 1
          if-no-files-found: error

  build-objs-macos:
    name: Prepare TON objects (${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }})
    needs: [ prepare ]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
            vendor: apple
            sys: darwin
          - runner: macos-15
            arch: aarch64
            vendor: apple
            sys: darwin
    env:
      TARGET_NAME: ${{ matrix.arch }}-${{ matrix.vendor }}-${{ matrix.sys }}

    permissions:
      contents: read

    steps:
      - name: Restore TON objects archive cache
        id: archive-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz.sha256
          key: ton-objs-${{ env.TARGET_NAME }}-${{ needs.prepare.outputs.ton_commit }}

      - name: Clone TON repository
        if: steps.archive-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ env.TON_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.ton_commit }}
          fetch-depth: 1
          submodules: true
          path: ton-repo

      - name: Build TON static libraries
        if: steps.archive-cache.outputs.cache-hit != 'true'
        run: |
          cd ton-repo
          cp assembly/native/build-macos-static.sh .
          chmod +x build-macos-static.sh
          ./build-macos-static.sh -a

      - name: Collect TON objects
        if: steps.archive-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p objs
          cp ton-repo/artifacts/libemulator.a objs/
          cp ton-repo/artifacts/libtolk.a objs/

      - name: Generate TON artifacts lock file
        if: steps.archive-cache.outputs.cache-hit != 'true'
        env:
          TON_COMMIT: ${{ needs.prepare.outputs.ton_commit }}
        # language=Bash
        run: |
          libemulator_sha256=$(shasum -a 256 objs/libemulator.a | awk '{ print $1 }')
          libtolk_sha256=$(shasum -a 256 objs/libtolk.a | awk '{ print $1 }')

          jq -n \
            --arg ton_commit "${TON_COMMIT}" \
            --arg rust_target "${TARGET_NAME}" \
            --arg libemulator_sha256 "${libemulator_sha256}" \
            --arg libtolk_sha256 "${libtolk_sha256}" \
            '{
              ton_commit: $ton_commit,
              rust_target: $rust_target,
              sha256_libemulator: $libemulator_sha256,
              sha256_libtolk: $libtolk_sha256
            }' > objs/ton-artifacts.lock

      - name: Validate TON objects
        if: steps.archive-cache.outputs.cache-hit != 'true'
        run: |
          ls -lh objs
          test -f objs/libemulator.a
          test -f objs/libtolk.a
          test -f objs/ton-artifacts.lock
          cat objs/ton-artifacts.lock

      - name: Pack TON objects
        if: steps.archive-cache.outputs.cache-hit != 'true'
        # language=Bash
        run: |
          ARCHIVE_NAME="ton-objs-${TARGET_NAME}.tar.gz"

          mkdir -p dist
          tar -C objs -czf "dist/${ARCHIVE_NAME}" \
            libemulator.a \
            libtolk.a \
            ton-artifacts.lock
          shasum -a 256 "dist/${ARCHIVE_NAME}" > "dist/${ARCHIVE_NAME}.sha256"

      - name: Save TON objects archive cache
        if: github.ref == 'refs/heads/master' && steps.archive-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz.sha256
          key: ton-objs-${{ env.TARGET_NAME }}-${{ needs.prepare.outputs.ton_commit }}

      - name: Upload TON objects artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ton-objs-${{ env.TARGET_NAME }}
          path: |
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz
            dist/ton-objs-${{ env.TARGET_NAME }}.tar.gz.sha256
          retention-days: 1
          if-no-files-found: error


  generate-trunk-objs-manifest:
    name: Generate Trunk Objs Manifest
    needs: [ build-objs-linux, build-objs-macos ]
    runs-on: ubicloud-standard-2-ubuntu-2204

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Download TON objects artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ton-objs-*
          path: dist
          merge-multiple: true

      - name: Extract TON artifacts manifests from archives
        # language=Bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          for archive in dist/ton-objs-*.tar.gz; do
            json_name="$(basename "${archive%.tar.gz}.json")"
            json_path="release-assets/${json_name}"
            tar -xOf "${archive}" ton-artifacts.lock > "${json_path}"
            test -s "${json_path}"
          done

      - name: Generate TON artifacts manifest
        # language=Bash
        run: |
          python3 .github/scripts/generate-artifacts-manifest.py \
            --input-path release-assets \
            --output-path dist/artifacts_manifest.toml

          test -s dist/artifacts_manifest.toml
          cat dist/artifacts_manifest.toml

      - name: Upload TON artifacts manifest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ton-objs-manifest
          path: dist/artifacts_manifest.toml
          retention-days: 1
          if-no-files-found: error

  create-trunk-objs-release:
    name: Create Trunk Objs Release
    needs: [ prepare, generate-trunk-objs-manifest ]
    runs-on: ubicloud-standard-2-ubuntu-2204
    if: github.ref == 'refs/heads/master'

    permissions:
      actions: write
      contents: write

    steps:
      - name: Download TON objects artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ton-objs-*
          path: dist
          merge-multiple: true

      - name: Delete download artifacts
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ github.token }}
          # language=JavaScript
          script: |
            const {
              data: artifacts,
            } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            if (artifacts.total_count === 0) {
              core.warning('No downloadable artifacts to delete');
              return;
            } else {
              core.info(`Found ${artifacts.total_count} artifacts to delete`);
            }

            for (const artifact of artifacts.artifacts) {
              core.info(`Deleting artifact ${artifact.name} (${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }

      - name: Delete previous trunk-objs release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete trunk-objs --repo "${GITHUB_REPOSITORY}" -y || true

          gh api \
            repos/${GITHUB_REPOSITORY}/git/refs/tags/trunk-objs \
            -X DELETE || true

      - name: Create trunk-objs release
        env:
          GH_TOKEN: ${{ github.token }}
          TON_COMMIT: ${{ needs.prepare.outputs.ton_commit }}
        run: |
          release_notes=$(cat <<EOF
          Generated from TON commit: https://github.com/${TON_REPOSITORY}/commit/${TON_COMMIT}
          EOF
          )

          gh release create trunk-objs \
            --repo "${GITHUB_REPOSITORY}" \
            dist/* \
            --title "Trunk Objs" \
            --notes "${release_notes}" \
            --target "${GITHUB_SHA}" \
            --prerelease

      - name: Delete previous trunk-objs release and tag (mirror)
        if: env.ENABLE_MIRRORING_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTON_PUBLIC }}
        run: |
          gh release delete trunk-objs --repo "${PUBLIC_ACTON_REPOSITORY}" -y || true

          gh api \
            repos/${PUBLIC_ACTON_REPOSITORY}/git/refs/tags/trunk-objs \
            -X DELETE || true

      - name: Create trunk-objs release (mirror)
        if: env.ENABLE_MIRRORING_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTON_PUBLIC }}
          TON_COMMIT: ${{ needs.prepare.outputs.ton_commit }}
        run: |
          release_notes=$(cat <<EOF
          Generated from TON commit: https://github.com/${TON_REPOSITORY}/commit/${TON_COMMIT}
          Source Acton commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          EOF
          )

          gh release create trunk-objs \
            --repo "${PUBLIC_ACTON_REPOSITORY}" \
            dist/* \
            --title "Trunk Objs" \
            --notes "${release_notes}" \
            --prerelease
