name: publish-mirror

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

permissions: { }

jobs:
  publish-mirror:
    runs-on: ubicloud-standard-2
    steps:
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup
        run: |
          rm -f artifacts/*-dist-manifest.json
      - id: source-release
        name: Read source release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: "${{ needs.plan.outputs.tag }}"
        run: |
          set -euo pipefail

          gh release view "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json name,body,isPrerelease \
            > "$RUNNER_TEMP/source-release.json"

          echo "title<<EOF" >> "$GITHUB_OUTPUT"
          jq -r '.name' "$RUNNER_TEMP/source-release.json" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "prerelease=$(jq -r '.isPrerelease' "$RUNNER_TEMP/source-release.json")" >> "$GITHUB_OUTPUT"
          jq -r '.body' "$RUNNER_TEMP/source-release.json" > "$RUNNER_TEMP/notes.txt"
      - name: Create mirror release
        env:
          GH_TOKEN: ${{ secrets.ACTON_PUBLIC }}
          RELEASE_TAG: "${{ needs.plan.outputs.tag }}"
          RELEASE_TITLE: "${{ steps.source-release.outputs.title }}"
          RELEASE_PRERELEASE: "${{ steps.source-release.outputs.prerelease }}"
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" --repo "${PUBLIC_ACTON_REPOSITORY}" >/dev/null 2>&1; then
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              gh release edit "${RELEASE_TAG}" \
                --repo "${PUBLIC_ACTON_REPOSITORY}" \
                --title "${RELEASE_TITLE}" \
                --notes-file "$RUNNER_TEMP/notes.txt" \
                --prerelease
            else
              gh release edit "${RELEASE_TAG}" \
                --repo "${PUBLIC_ACTON_REPOSITORY}" \
                --title "${RELEASE_TITLE}" \
                --notes-file "$RUNNER_TEMP/notes.txt" \
                --latest
            fi
          else
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              gh release create "${RELEASE_TAG}" \
                --repo "${PUBLIC_ACTON_REPOSITORY}" \
                --title "${RELEASE_TITLE}" \
                --notes-file "$RUNNER_TEMP/notes.txt" \
                --prerelease
            else
              gh release create "${RELEASE_TAG}" \
                --repo "${PUBLIC_ACTON_REPOSITORY}" \
                --title "${RELEASE_TITLE}" \
                --notes-file "$RUNNER_TEMP/notes.txt" \
                --latest
            fi
          fi

          gh release upload "${RELEASE_TAG}" \
            --repo "${PUBLIC_ACTON_REPOSITORY}" \
            --clobber \
            artifacts/*

