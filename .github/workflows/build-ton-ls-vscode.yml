name: Build TON VS Code Extension

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/build-ton-ls-vscode.yml"
      - "crates/ton-ls/editors/code/**"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/build-ton-ls-vscode.yml"
      - "crates/ton-ls/editors/code/**"
  workflow_dispatch:

concurrency:
  group: build-vscode-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  build:
    name: Build VS Code Extension
    runs-on: ubicloud-standard-2-ubuntu-2204

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x

      - name: Audit dependencies
        working-directory: crates/ton-ls/editors/code
        run: yarn npm audit --all --recursive --severity=moderate

      - name: Install dependencies
        working-directory: crates/ton-ls/editors/code
        run: yarn install --immutable --check-cache --check-resolutions

      - name: Build extension
        working-directory: crates/ton-ls/editors/code
        run: yarn run build
