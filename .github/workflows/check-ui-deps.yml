name: Check UI Dependencies

on:
  workflow_call:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/check-ui-deps.yml"
      - ".npmrc"
      - "bun.lock"
      - "bunfig.toml"
      - "package.json"
      - "crates/acton-**-ui/package.json"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/check-ui-deps.yml"
      - ".npmrc"
      - "bun.lock"
      - "bunfig.toml"
      - "package.json"
      - "crates/acton-**-ui/package.json"
  workflow_dispatch:

concurrency:
  group: check-ui-deps-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  bun-audit:
    name: Bun audit
    runs-on: ubicloud-standard-2-ubuntu-2204

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Installing additional Rust components
        uses: taiki-e/install-action@4bc351f7f2614e48088386e2a0ad917ca3a7e4ba # v2.81.5
        with:
          tool: just@1.49.0
          fallback: none

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Run Bun audit
        run: just check-ui-security
