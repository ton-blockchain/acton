name: Check Zizmor

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/**"
  push:
    branches:
      - master
    paths:
      - ".github/**"
  workflow_dispatch:

concurrency:
  group: check-zizmor-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  zizmor:
    name: Check Zizmor
    runs-on: ubicloud-standard-2-ubuntu-2204

    permissions:
      contents: read
      security-events: write # upload SARIF report

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          min-severity: 'high'
          persona: 'auditor'
