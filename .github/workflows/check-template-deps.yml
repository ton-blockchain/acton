name: Check Template Dependencies

on:
  workflow_call:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/check-template-deps.yml"
      - "src/commands/new/templates/**-app/.npmrc"
      - "src/commands/new/templates/**-app/package.json"
      - "src/commands/new/templates/**-app/package-lock.json"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/check-template-deps.yml"
      - "src/commands/new/templates/**-app/.npmrc"
      - "src/commands/new/templates/**-app/package.json"
      - "src/commands/new/templates/**-app/package-lock.json"
  workflow_dispatch:

concurrency:
  group: check-template-deps-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  npm-audit:
    name: NPM audit
    runs-on: ubicloud-standard-2-ubuntu-2204

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Installing additional Rust components
        uses: taiki-e/install-action@4bc351f7f2614e48088386e2a0ad917ca3a7e4ba # v2.81.5
        with:
          tool: just@1.49.0
          fallback: none

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x

      - name: Run npm audit
        run: just check-templates-security
