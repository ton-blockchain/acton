name: Publish Docker image

on:
  workflow_call:
    inputs:
      plan:
        required: false
        default: ""
        type: string

concurrency:
  group: publish-docker-image-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  publish-docker-image:
    name: Publish Docker image
    runs-on: ubicloud-standard-2-ubuntu-2204

    permissions:
      contents: read
      packages: write

    env:
      ACTON_NAME: ghcr.io/ton-blockchain/acton

    steps:
      - name: Download Docker archives
        uses: actions/download-artifact@v8
        with:
          pattern: intermediate-docker-image-*
          path: docker-artifacts
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Load Docker archives
        # language=Bash
        run: |
          docker load -i docker-artifacts/acton-linux-amd64.docker.tar
          docker load -i docker-artifacts/acton-linux-arm64.docker.tar

      - name: Push platform images and manifest
        env:
          VERSION_TAG: ${{ github.ref_name }}
        # language=Bash
        run: |
          docker tag "acton:${VERSION_TAG}-linux-amd64" "${ACTON_NAME}:${VERSION_TAG}-amd64"
          docker tag "acton:${VERSION_TAG}-linux-arm64" "${ACTON_NAME}:${VERSION_TAG}-arm64"

          docker push "${ACTON_NAME}:${VERSION_TAG}-amd64"
          docker push "${ACTON_NAME}:${VERSION_TAG}-arm64"

          docker buildx imagetools create \
            --tag "${ACTON_NAME}:${VERSION_TAG}" \
            "${ACTON_NAME}:${VERSION_TAG}-amd64" \
            "${ACTON_NAME}:${VERSION_TAG}-arm64"

      - name: Inspect published manifest
        env:
          VERSION_TAG: ${{ github.ref_name }}
        # language=Bash
        run: |
          docker buildx imagetools inspect "${ACTON_NAME}:${VERSION_TAG}"
