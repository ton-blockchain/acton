name: Cleanup Ubicloud GitHub Cache

on:
  schedule:
    # 00:00 Europe/Moscow every 3rd day of the month (21:00 UTC)
    - cron: "0 21 */3 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview cache cleanup without deleting anything
        required: false
        type: boolean
        default: false
      keep:
        description: Keep the last N Ubicloud cache entries; leave empty to keep 5 and auto-enable dry-run
        required: false
        type: number
        default: 5

concurrency:
  group: ubicloud-cleanup
  cancel-in-progress: true

permissions: { }

jobs:
  cleanup-cache-ubicloud:
    name: Delete caches via Ubicloud xtask
    if: github.repository == 'i582/acton'
    runs-on: ubicloud-standard-2-ubuntu-2204

    permissions:
      contents: read

    env:
      UBICLOUD_API_TOKEN: ${{ secrets.UBI_TOKEN }}
      UBICLOUD_PROJECT_ID: pj3hr0c5d1ny7mx25m3tch57hn
      XTASK_KEEP: ${{ inputs.keep }}
      XTASK_DRY_RUN: ${{ inputs.dry_run }}

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup toolchain install

      - name: Run Ubicloud cache cleanup xtask
        env:
          GITHUB_INSTALLATION: ${{ github.repository_owner }}
          GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
        # language=Bash
        run: |
          args=(
            run -p xtask -- ubicloud-cleanup
            --project "${UBICLOUD_PROJECT_ID}"
            --installation "${GITHUB_INSTALLATION}"
            --repository "${GITHUB_REPOSITORY_NAME}"
          )

          if [[ -n "${XTASK_KEEP}" ]]; then
            args+=(--keep "${XTASK_KEEP}")
          fi

          if [[ "${XTASK_DRY_RUN}" == 'true' ]]; then
            args+=(--dry-run)
          fi

          cargo "${args[@]}"
