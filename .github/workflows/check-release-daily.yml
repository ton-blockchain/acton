name: Check Release Daily

on:
  # Disabled for automatic runs; kept for ad hoc checks from the Actions UI.
  workflow_dispatch:

concurrency:
  group: check-release-daily
  cancel-in-progress: true

permissions: { }

jobs:
  build-release-binaries:
    name: Build release binaries
    if: github.repository == 'ton-blockchain/acton'

    permissions:
      contents: read

    uses: ./.github/workflows/build-release-binaries.yml
    secrets: inherit

  check-release:
    name: Check release
    if: github.repository == 'ton-blockchain/acton'
    needs: [ build-release-binaries ]

    permissions:
      contents: read

    uses: ./.github/workflows/check-release.yml
    secrets: inherit
