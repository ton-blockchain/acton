name: Check Grammar Dependencies

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/check-grammar-deps.yml"
      - "crates/tree-sitter-fift"
      - "crates/tree-sitter-tasm"
      - "crates/tree-sitter-tlb"
      - "crates/tree-sitter-tolk"
  workflow_dispatch:

concurrency:
  group: check-grammar-deps-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  grammar-audit:
    name: Yarn audit
    runs-on: ubicloud-standard-2-ubuntu-2204

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.x

      - name: Run Yarn audits
        shell: bash
        # language=Bash
        run: |
          while IFS= read -r lockfile; do
            dir="$(dirname "$lockfile")"
            echo "::group::yarn npm audit (${dir#./})"
            (
              cd "$dir"
              yarn npm audit --all --recursive --severity=moderate
            )
            echo "::endgroup::"
          done < <(find . -name yarn.lock -not -path '*/node_modules/*' | sort)
