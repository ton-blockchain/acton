name: Check Rust Dependencies

on:
  workflow_call:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/check-rust-deps.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/check-rust-deps.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
  workflow_dispatch:

concurrency:
  group: check-deps-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  rust-audit:
    name: Rust audit
    runs-on: ubicloud-standard-2-ubuntu-2204

    permissions:
      contents: read

    steps:
      - name: Check out Acton repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install cargo-deny
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: just@1.52.0,cargo-deny@0.19.8,cargo-audit@0.22.1
          fallback: none

      - name: Run cargo-deny
        run: just check-deny

      - name: Run cargo-audit
        run: just check-audit
