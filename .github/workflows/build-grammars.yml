name: Build tree-sitter grammars

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/build-grammars.yml"
      - "crates/tree-sitter-**/**"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/build-grammars.yml"
      - "crates/tree-sitter-**/**"

concurrency:
  group: grammars-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  tree-sitter-grammars:
    name: Test tree-sitter-${{ matrix.language }} grammar
    runs-on: ubicloud-standard-4-ubuntu-2204
    strategy:
      fail-fast: false
      matrix:
        language:
          - fift
          - tasm
          - tlb
          - tolk
    if: true

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x

      - name: Install dependencies
        working-directory: crates/tree-sitter-${{ matrix.language }}
        run: yarn install --immutable --check-cache --check-resolutions

      - name: Build
        working-directory: crates/tree-sitter-${{ matrix.language }}
        run: yarn tree-sitter generate

      - name: Test parsers
        working-directory: crates/tree-sitter-${{ matrix.language }}
        run: yarn tree-sitter test
