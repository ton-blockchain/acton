name: Build tree-sitter grammars

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/build-grammars.yml"
      - "crates/tree-sitter-**/**"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/build-grammars.yml"
      - "crates/tree-sitter-**/**"

concurrency:
  group: grammars-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  tree-sitter-grammars:
    name: Test tree-sitter-${{ matrix.language }} grammar
    runs-on: ubicloud-standard-4-ubuntu-2204
    strategy:
      fail-fast: false
      matrix:
        language:
          - fift
          - tasm
          - tlb
          - tolk
    if: true

    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        working-directory: crates/tree-sitter-${{ matrix.language }}
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: crates/tree-sitter-${{ matrix.language }}
        run: bunx tree-sitter generate

      - name: Test parsers
        working-directory: crates/tree-sitter-${{ matrix.language }}
        run: bunx tree-sitter test
