name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Acton
        uses: i582/setup-acton@master

      - name: Build
        run: acton build

      - name: Test
        run: acton test

      - name: Linter
        run: acton check --output-format github

      - name: Formatter
        run: acton fmt --check
