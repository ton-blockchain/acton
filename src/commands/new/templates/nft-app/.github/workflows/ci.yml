name: Build and Test

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Acton
        uses: ton-blockchain/setup-acton@005f3ac616cd74b0b16d40884502e231e14f5f2d # v0.3.0

      - name: Acton Build
        run: acton build

      - name: Acton Formatter
        run: acton fmt --check

      - name: Acton Linter
        run: acton check --output-format github

      - name: Node Test
        run: npm run test

      - name: Install Node dependencies
        run: npm ci

      - name: Node Formatter
        run: npm run fmt:check

      - name: Node Typecheck
        run: npm run typecheck

      - name: Node Build
        run: npm run build
