[package]
name = "emulator-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
# local creates
tree-sitter-tolk = { path = "./tree-sitter-tolk" }
tolkc = { path = "crates/tolkc" }

tonlib-core = "0.26.1"
num-bigint = "0.4.6"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tycho-types = "0.3.0"
hex = "0.4.3"
base64 = "0.22.1"
lazy_static = "1.5.0"
thiserror = "2.0.17"
crc = "3.3.0"
owo-colors = "4.2.3"
once_cell = "1.20.2"
tree-sitter = "0.25.10"
clap = { version = "4.5", features = ["derive"] }
include_dir = { version = "0.7.4" }

[build-dependencies]
pkg-config = "0.3.32"
bindgen = "0.72.1"
cc="*"
