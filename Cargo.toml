[package]
name = "emulator-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
# local creates
abi = { path = "crates/abi" }
tolkc = { path = "crates/tolkc" }
emulator = { path = "crates/emulator" }
tolk_parser = { path = "crates/tolk_parser" }
dap = { path = "crates/dap" }

tonlib-core = "0.26.1"
num-bigint = "0.4.6"
tycho-types = "0.3.0"
hex = "0.4.3"
crc = "3.3.0"
owo-colors = "4.2.3"
tree-sitter = "0.25.10"
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0.100"
regex = "1.11.1"
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
toml = "0.9.8"
include_dir = "0.7"
num-traits = "0.2.19"
inquire = "0.7"
thiserror = "2.0.17"
crossbeam-channel = "0.5.15"
